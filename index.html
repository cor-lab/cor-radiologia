<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COR — Centro Odontológico de Radiologia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#4ab848;--gl:#7dcf6e;--gp:#d4f0cc;
  --nv:#0d1830;--nm:#12244e;--nl:#1a3a8c;
  --wh:#f8f6f1;--gr:#7a8fa8;--rd:#e05252;--or:#fb923c;
  --tl:#2dd4bf;--pu:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--nv);color:var(--wh);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#LS{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:linear-gradient(135deg,#0d1830 0%,#12244e 50%,#0d2a1a 100%);
  position:fixed;inset:0;z-index:9999;}
#LS::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 60% at 20% 20%,rgba(74,184,72,.08),transparent 60%),
             radial-gradient(ellipse 50% 50% at 80% 80%,rgba(26,58,140,.15),transparent 60%);
  pointer-events:none;}
.lcrd{background:rgba(18,36,78,.92);border:1px solid rgba(74,184,72,.28);border-radius:20px;
  padding:40px 36px;width:100%;max-width:400px;backdrop-filter:blur(20px);
  box-shadow:0 24px 64px rgba(0,0,0,.5);position:relative;z-index:1;animation:fup .35s ease;}
@keyframes fup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.llogo{text-align:center;margin-bottom:24px}
.llogo img{height:52px;width:auto;object-fit:contain}
.ldiv{height:1px;background:linear-gradient(90deg,transparent,rgba(74,184,72,.3),transparent);margin:16px 0}
.ltitle{font-family:"Playfair Display",serif;font-size:1.1rem;text-align:center;margin-bottom:4px}
.lsub{text-align:center;font-size:.8rem;color:var(--gr);margin-bottom:22px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lf label{font-size:.73rem;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.05em}
.lf input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:11px 13px;color:var(--wh);font-family:"DM Sans",sans-serif;font-size:.88rem;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.lf input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(74,184,72,.12)}
.lbtn{width:100%;padding:12px;margin-top:4px;background:linear-gradient(135deg,var(--g),var(--gl));
  border:none;border-radius:10px;cursor:pointer;font-family:"DM Sans",sans-serif;
  font-size:.92rem;font-weight:700;color:#fff;transition:all .2s;box-shadow:0 4px 16px rgba(74,184,72,.3);}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(74,184,72,.4)}
.lbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.lerr{background:rgba(224,82,82,.12);border:1px solid rgba(224,82,82,.25);border-radius:8px;
  padding:9px 13px;font-size:.81rem;color:#f87171;margin-top:10px;display:none;text-align:center;}
.lerr.show{display:block}
.dac{margin-top:20px;padding:13px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:10px;}
.dat{font-size:.7rem;font-weight:700;color:var(--gr);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:9px;text-align:center}
.dai{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;
  cursor:pointer;transition:background .14s;border-bottom:1px solid rgba(255,255,255,.05);}
.dai:last-child{border-bottom:none}
.dai:hover{background:rgba(255,255,255,.05)}
.rb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
  font-size:.69rem;font-weight:700;white-space:nowrap}
.rb-a{background:rgba(74,184,72,.15);color:#4ab848}
.rb-ag{background:rgba(45,212,191,.15);color:#2dd4bf}
.rb-c{background:rgba(167,139,250,.15);color:#a78bfa}
.rb-d{background:rgba(251,146,60,.15);color:#fb923c}
.dem{font-size:.75rem;color:var(--gr);font-family:"DM Mono",monospace;flex:1}
.dpw{font-size:.69rem;color:rgba(255,255,255,.25);font-family:"DM Mono",monospace}

/* APP */
#AS{display:none}
header{position:sticky;top:0;z-index:200;background:rgba(13,24,48,.94);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(74,184,72,.15);padding:0 24px;display:flex;
  align-items:center;justify-content:space-between;height:62px;gap:12px}
.hlogo img{height:36px;width:auto;object-fit:contain}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav button{background:none;border:none;cursor:pointer;padding:7px 12px;border-radius:7px;
  font-family:"DM Sans",sans-serif;font-size:.81rem;font-weight:500;color:var(--gr);transition:all .18s}
nav button:hover{color:var(--wh);background:rgba(255,255,255,.05)}
nav button.active{color:var(--g);background:rgba(74,184,72,.12)}
.hr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.upill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 11px;}
.uav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.68rem;flex-shrink:0}
.uname{font-size:.78rem;font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logoutb{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.2);border-radius:7px;
  padding:5px 10px;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.74rem;
  font-weight:600;color:#f87171;transition:all .15s;}
.logoutb:hover{background:rgba(224,82,82,.2)}

/* PAGES */
.page{display:none;position:relative;z-index:1}
.page.active{display:block}
.pi{padding:24px 28px}
.card{background:rgba(18,36,78,.7);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:22px}
.card-sm{padding:14px 18px}
.ctitle{font-family:"Playfair Display",serif;font-size:1.05rem;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;
  cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.83rem;font-weight:600;
  transition:all .18s;border:none;white-space:nowrap}
.btng{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff}
.btng:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(74,184,72,.3)}
.btno{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--wh)}
.btno:hover{background:rgba(255,255,255,.1)}
.btnr{background:rgba(224,82,82,.12);border:1px solid rgba(224,82,82,.22);color:#f87171}
.btnr:hover{background:rgba(224,82,82,.2)}
.btnt{background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.28);color:var(--tl)}
.bsm{padding:5px 11px;font-size:.76rem}
.bico{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.74rem;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:10px 12px;color:var(--wh);font-family:"DM Sans",sans-serif;
  font-size:.87rem;outline:none;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g)}
.field select option{background:#12244e}
.field textarea{resize:vertical;min-height:68px}
.field input[type=color]{padding:3px 6px;height:36px;cursor:pointer}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 13px;font-size:.71rem;font-weight:700;color:var(--gr);
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{font-size:.71rem;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
.bg{background:rgba(74,184,72,.15);color:var(--g)}
.bt{background:rgba(45,212,191,.15);color:var(--tl)}
.br{background:rgba(224,82,82,.15);color:#f87171}
.bo{background:rgba(251,146,60,.15);color:var(--or)}
.bgo{background:rgba(201,168,76,.15);color:#c9a84c}
.bgr{background:rgba(255,255,255,.08);color:var(--gr)}
.bp{background:rgba(167,139,250,.15);color:var(--pu)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.sc{background:rgba(18,36,78,.7);border:1px solid rgba(255,255,255,.07);border-radius:12px;
  padding:18px;position:relative;overflow:hidden;transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--g))}
.si{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:19px;margin-bottom:12px;background:rgba(255,255,255,.06)}
.sv{font-family:"Playfair Display",serif;font-size:1.9rem;font-weight:700;line-height:1;margin-bottom:3px}
.sl{font-size:.76rem;color:var(--gr);font-weight:500}
.sch{margin-top:8px;font-size:.73rem;font-weight:600;color:var(--g)}
/* Modal */
.mo{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.72);
  backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.mb{background:rgba(18,36,78,.98);border:1px solid rgba(74,184,72,.2);border-radius:16px;
  padding:28px;width:100%;max-width:600px;animation:mIn .2s ease;max-height:94vh;overflow-y:auto}
.mb.msm{max-width:380px;text-align:center}
@keyframes mIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mt{font-family:"Playfair Display",serif;font-size:1.1rem}
.mx{background:none;border:none;color:var(--gr);cursor:pointer;font-size:1.2rem;padding:2px 6px;border-radius:5px}
.mx:hover{color:var(--wh)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(18,36,78,.98);
  border:1px solid rgba(74,184,72,.3);border-radius:10px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;transform:translateY(14px);opacity:0;
  transition:all .25s;pointer-events:none;min-width:240px}
.toast.show{transform:translateY(0);opacity:1}
/* Search */
.sr{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sw{flex:1;min-width:200px;position:relative}
.sw input{padding-left:36px}
.swi{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gr);pointer-events:none}
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ftab{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:600;
  transition:all .14s;border:1px solid rgba(255,255,255,.1);color:var(--gr);background:rgba(255,255,255,.04)}
.ftab:hover{border-color:rgba(74,184,72,.4);color:var(--g)}
.ftab.active{background:rgba(74,184,72,.15);border-color:var(--g);color:var(--g)}
/* Calendar */
.cw{display:grid;grid-template-columns:1fr 320px;gap:20px}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cmn{font-family:"Playfair Display",serif;font-size:1.05rem}
.cnv{display:flex;gap:5px}
.cnb{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);color:var(--wh);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .14s}
.cnb:hover{background:rgba(74,184,72,.2);border-color:var(--g)}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cdn{text-align:center;font-size:.67rem;font-weight:700;color:var(--gr);
  padding:5px 0;text-transform:uppercase;letter-spacing:.04em}
.cd{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;transition:all .13s;font-size:.82rem;font-weight:500;gap:2px}
.cd:hover:not(.emp){background:rgba(255,255,255,.07)}
.cd.emp{cursor:default;color:var(--gr);opacity:.22}
.cd.tod{background:rgba(74,184,72,.12);border:1px solid rgba(74,184,72,.35);color:var(--g)}
.cd.sel{background:var(--g)!important;color:#fff!important}
.cd.pas{opacity:.35;pointer-events:none}
.sgr{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.slot{padding:8px 4px;border-radius:7px;text-align:center;font-size:.77rem;font-weight:600;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  transition:all .13s;font-family:"DM Mono",monospace}
.slot:hover:not(.busy){border-color:var(--g);color:var(--g)}
.slot.busy{color:var(--gr);opacity:.32;cursor:not-allowed;text-decoration:line-through}
.slot.sel{background:rgba(74,184,72,.18);border-color:var(--g);color:var(--g)}
.exgr{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.exop{padding:10px 7px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);text-align:center;transition:all .13s;font-size:.78rem;font-weight:500}
.exop:hover{border-color:rgba(74,184,72,.4)}
.exop.sel{background:rgba(74,184,72,.15);border-color:var(--g);color:var(--g)}
.exico{font-size:1.15rem;margin-bottom:3px}
.exprice{font-size:.7rem;color:var(--gr);margin-top:2px}
.smb{background:rgba(74,184,72,.07);border:1px solid rgba(74,184,72,.18);border-radius:9px;padding:14px}
.smr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.84rem}
.smt{font-weight:700;color:var(--g);margin-top:6px;padding-top:6px;border-top:1px solid rgba(74,184,72,.18)}
.cbn{background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.18);border-radius:7px;
  padding:8px 12px;font-size:.79rem;color:var(--tl);display:flex;align-items:center;gap:6px;margin-top:8px}
/* Portal */
.ph{background:linear-gradient(135deg,rgba(26,58,140,.5),rgba(18,36,78,.9));
  border:1px solid rgba(74,184,72,.22);border-radius:14px;padding:28px;
  display:grid;grid-template-columns:1fr auto;gap:24px;margin-bottom:20px;position:relative;overflow:hidden}
.ph::after{content:"◆";position:absolute;right:50px;top:-20px;font-size:140px;
  color:rgba(74,184,72,.04);line-height:1;pointer-events:none}
.dpf{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.dav{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;flex-shrink:0;border:3px solid rgba(74,184,72,.35)}
.di h2{font-family:"Playfair Display",serif;font-size:1.28rem}
.di p{color:var(--gr);font-size:.84rem;margin-top:3px}
.lvc{display:inline-flex;align-items:center;gap:5px;background:rgba(74,184,72,.14);
  border:1px solid rgba(74,184,72,.28);border-radius:20px;padding:3px 10px;
  font-size:.73rem;font-weight:700;color:var(--g);margin-top:6px}
.pgbg{background:rgba(255,255,255,.08);border-radius:20px;height:6px;overflow:hidden}
.pgfl{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--g),var(--gl));transition:width .8s ease}
.cp{text-align:center;background:rgba(74,184,72,.08);border:1px solid rgba(74,184,72,.18);
  border-radius:11px;padding:20px 26px;align-self:flex-start}
.cbig{font-family:"Playfair Display",serif;font-size:2.6rem;color:var(--g);line-height:1}
.clbl{font-size:.7rem;color:var(--gr);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.cval{font-size:.86rem;color:var(--tl);margin-top:6px;font-weight:600}
.rwgr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rwcd{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:9px;
  padding:14px;cursor:pointer;transition:all .17s;display:flex;flex-direction:column;gap:5px;position:relative}
.rwcd:hover:not(.lkd){border-color:rgba(74,184,72,.35);background:rgba(74,184,72,.05)}
.rwcd.lkd{opacity:.45}
.ric{font-size:1.4rem}
.rn{font-size:.86rem;font-weight:600}
.rd{font-size:.74rem;color:var(--gr)}
.rft{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.rpt{font-family:"DM Mono",monospace;font-size:.82rem;color:var(--g);font-weight:700}
.lki{position:absolute;top:9px;right:9px;font-size:.78rem;color:var(--gr)}
.ei{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ei:last-child{border-bottom:none}
.eico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.einfo{flex:1}
.edesc{font-size:.85rem;font-weight:500}
.edate{font-size:.72rem;color:var(--gr);margin-top:2px}
.epts{font-family:"DM Mono",monospace;font-weight:700;font-size:.9rem}
.pp{color:var(--g)}.pm{color:#f87171}
/* Rank */
.ri{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ri:last-child{border-bottom:none}
.rn2{font-family:"DM Mono",monospace;font-size:.83rem;color:var(--gr);min-width:20px;text-align:center}
.rav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.rin{flex:1}
.rnm{font-size:.86rem;font-weight:500}
.rsb{font-size:.72rem;color:var(--gr)}
.rpts{font-family:"DM Mono",monospace;font-size:.86rem;color:var(--g);font-weight:700}
/* Config items */
.citm{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.citm:last-child{border-bottom:none}
.cinf{flex:1}
.cinm{font-size:.86rem;font-weight:500}
.cisb{font-size:.73rem;color:var(--gr);margin-top:2px}
.cact{display:flex;gap:5px;align-items:center}
/* Convenios */
.ccrd{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  padding:14px;
  display:grid;
  grid-template-columns:42px minmax(0,1fr) auto;
  align-items:center;
  gap:12px;
  transition:all .17s;
  cursor:pointer;
  height:70px;
}
.ccrd:hover{border-color:rgba(74,184,72,.25)}
.ccrd.sel{border-color:var(--g);background:rgba(74,184,72,.07)}
.clog{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.cnfo{flex:1}
.cnm{font-size:.88rem;font-weight:600}
.cds{font-size:.74rem;color:var(--gr);margin-top:2px}
.cgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px;
  align-items:stretch;
}
.cfgs{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.wapv{background:#0f1e0f;border:1px solid rgba(74,184,72,.2);border-radius:10px;
  padding:14px;font-family:"DM Mono",monospace;font-size:.8rem;line-height:1.6;color:#a8d8a8;margin-top:10px}
.wabl{background:#1a3a1a;border-radius:12px 12px 12px 2px;padding:11px 13px;
  display:inline-block;max-width:100%;white-space:pre-wrap;font-size:.8rem;line-height:1.5}
/* Usuarios */
.adeny{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:14px;text-align:center;color:var(--gr)}
.adeny .adi{font-size:2.8rem}

function filtrarExames(inp, idBase){
  var termo = String((inp && inp.value) || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();

  var root = document.getElementById(idBase);
  if(!root) return;

  var rows = Array.from(root.querySelectorAll("[data-exame]"));

  rows.forEach(function(row){
    var nome = String(row.getAttribute("data-nome") || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");

    var match = !termo || nome.indexOf(termo) >= 0;
    row.style.display = match ? "grid" : "none";

    var score = 9999;
    if(match){
      if(nome.indexOf(termo) === 0) score = 0;       // começa com o termo
      else score = nome.indexOf(termo);              // aparece depois
    }
    row.dataset.score = String(score);
  });

  rows
    .filter(function(row){ return row.style.display !== "none"; })
    .sort(function(a, b){
      return Number(a.dataset.score || 9999) - Number(b.dataset.score || 9999);
    })
    .forEach(function(row){
      root.appendChild(row);
    });
}

    // Buscar perfil na tabela usuarios — SEM criar nem modificar nada
    var pr=await supa.from("usuarios").select("*").eq("email",em).eq("ativo",true).single();

    if(pr.error || !pr.data){
      // Perfil não encontrado — negar login com mensagem clara
      await supa.auth.signOut();
      btn.disabled=false; btn.textContent="Entrar";
      err.classList.add("show");

    var u=pr.data;
    CU={

    };

    console.error("Login error:",e.message);
  }
}

  var r=isNew?await supa.from("exames_tipos").insert(d).select().single():await supa.from("exames_tipos").update(d).eq("id",ex.id);
  if(!r.error&&isNew&&r.data)ex.id=r.data.id;
  return !r.error;
}
async function dbDelEx(id){return !(await supa.from("exames_tipos").update({ativo:false}).eq("id",id)).error;}

// ── CONVENIOS ──
async function dbSaveCv(cv,isNew){
  var d={id:cv.id,nome:cv.n,icone:cv.ico,descricao:cv.ds,cor:cv.cl,ativo:true};
  var r=isNew?await supa.from("convenios").insert(d).select().single():await supa.from("convenios").update(d).eq("id",cv.id);
  if(r.error){console.error("dbSaveCv:",r.error);return false;}
  if(isNew&&r.data)cv.id=r.data.id;
  // Salvar preços com nome customizado
  await supa.from("convenio_precos").delete().eq("convenio_id",cv.id);
  var prs=Object.keys(cv.pr||{}).map(function(k){
    return{convenio_id:cv.id,exame_id:k,preco:cv.pr[k],
      nome_convenio:(cv.nomes&&cv.nomes[k])?cv.nomes[k]:null};
  });
  if(prs.length){
    var rp=await supa.from("convenio_precos").insert(prs);
    if(rp.error)console.warn("convenio_precos insert:",rp.error);
  }
  return true;
}
async function dbDelCv(id){
  await supa.from("convenio_precos").delete().eq("convenio_id",id);
  return !(await supa.from("convenios").update({ativo:false}).eq("id",id)).error;
}

// ── AGENDAMENTOS ──
async function dbSaveAg(ag){
  var d = {
    paciente_nome: ag.pac,
    paciente_tel: ag.tel,
    exame_id: (ag.exames && ag.exames[0]) ? ag.exames[0].exame_id : ag.ex,
    data_exame: br2iso(ag.dt),
    hora_exame: ag.hr,
    duracao: ag.dur,
    dentista_id: ag.dId,
    convenio_id: (ag.exames && ag.exames[0]) ? (ag.exames[0].convenio_id || null) : (ag.cv || null),
    valor: ag.vl,
    cashback_pts: ag.cb,
    status: ag.st
  };

  var r = ag._new
    ? await supa.from("agendamentos").insert(d).select().single()
    : await supa.from("agendamentos").update(d).eq("id", ag.id).select().single();

  if (!r.error && ag._new && r.data) ag.id = r.data.id;
  if (r.error) {
    console.error("dbSaveAg:", r.error);
    return false;
  }

  // salva os múltiplos exames na tabela filha
  if (ag.id && Array.isArray(ag.exames)) {
    // apaga os vínculos antigos desse agendamento
    var del = await supa.from("agendamento_exames")
      .delete()
      .eq("agendamento_id", ag.id);

    if (del.error) {
      console.error("dbSaveAg delete filhos:", del.error);
      return false;
    }

    // insere os exames atuais
    if (ag.exames.length) {
      var rows = ag.exames.map(function(it, idx){
        var ex = fex(it.exame_id);
        return {
          agendamento_id: ag.id,
          exame_id: it.exame_id,
          convenio_id: it.convenio_id || null,
          preco: Number(it.preco || 0),
          nome_exame: ex ? ex.n : it.exame_id,
          ordem: idx + 1
        };
      });

      var ins = await supa.from("agendamento_exames").insert(rows);

      if (ins.error) {
        console.error("dbSaveAg insert filhos:", ins.error);
        return false;
      }
    }
  }

  var dent = fdent(ag.dId);
  if (dent) {
    await supa.from("dentistas")
      .update({ pontos: dent.pts, indicacoes: dent.ind })
      .eq("id", dent.id);
  }

  return true;
}
async function dbUpdAgSt(id,st){await supa.from("agendamentos").update({status:st}).eq("id",id);}

// ── USUARIOS ──
async function dbSaveUser(u, senha, isNew) {
  var bgMap = {
    admin:    "linear-gradient(135deg,#4ab848,#7dcf6e)",
    agenda:   "linear-gradient(135deg,#2dd4bf,#0d9488)",
    cashback: "linear-gradient(135deg,#a78bfa,#7c3aed)",
    dentista: "linear-gradient(135deg,#fbbf24,#f59e0b)"
  };
  var role = String(u.role || "agenda");
  var email = String(u.email || "").trim().toLowerCase();
  var ini  = (u.ini || u.nome.split(" ").map(function(x){return x[0]||"";}).join("").slice(0,2)).toUpperCase();
  var bg   = bgMap[role] || bgMap["agenda"];

  var supaAuth = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false,
      storage: {
        getItem: function(){ return null; },
        setItem: function(){},
        removeItem: function(){}
      }
    }
  });

  try {
    if (isNew) {
      var perfil = {
        nome: u.nome,
        email: email,
        role: role,
        ini: ini,
        bg: bg,
        cor: "#fff",
        ativo: true,
        dent_id: u.dentId || null
      };

      var r = await supa.from("usuarios").insert(perfil).select().single();
      console.log("PROFILE INSERT =>", r);

      if (r.error) {
        console.error("PROFILE INSERT error =>", r.error);
        var r2 = await supa.from("usuarios")
          .update({ nome: u.nome, role: role, ini: ini, bg: bg, ativo: true, dent_id: u.dentId || null })
          .eq("email", email)
          .select().single();
        console.log("PROFILE UPDATE fallback =>", r2);
        if (r2.error) {
          console.error("PROFILE UPDATE fallback error =>", r2.error);
          return false;
        }
        if (r2.data) u.id = r2.data.id;
      } else if (r.data) {
        u.id = r.data.id;
      }

      if (senha) {
        var authRes = await supaAuth.auth.signUp({ email: email, password: senha });
        console.log("AUTH signUp =>", authRes);
        if (authRes.error) {
          console.error("AUTH signUp error =>", authRes.error);
          return false;
        }
      }
      return true;
    } else {
      var upd = { nome: u.nome, role: role, ini: ini, bg: bg, ativo: u.ativo !== false, dent_id: u.dentId || null };
      var r3 = await supa.from("usuarios").update(upd).eq("email", email).select().single();
      if (r3.error) {
        console.error("update error:", r3.error);
        return false;
      }
      return true;
    }
  } catch (e) {
    console.error("dbSaveUser fatal =>", e);
    return false;
  }
}

async function dbToggleUser(email,ativo){await supa.from("usuarios").update({ativo:ativo}).eq("email",email);console.log("toggle",email,ativo);}

// ── RESGATAR ──
async function dbResgatar(dentId,premId,pts){
  var d=fdent(dentId); if(!d)return false;
  var r=await supa.from("resgates").insert({dentista_id:dentId,premio_id:premId,pontos_usados:pts,status:"pendente"});
  if(r.error){console.error("dbResgatar:",r.error);return false;}
  d.pts-=pts;
  await supa.from("dentistas").update({pontos:d.pts}).eq("id",dentId);
  return true;
}

var CU = null;


function doLogin() {
  var email = document.getElementById("lEmail").value.trim().toLowerCase();
  var senha = document.getElementById("lPass").value;
  var btn = document.getElementById("lBtn");
  var err = document.getElementById("lErr");
  err.classList.remove("show");
  btn.disabled = true;
  btn.textContent = "Verificando...";
  setTimeout(function() {
    var u = null;
    for (var i = 0; i < USERS.length; i++) {
      if (USERS[i].email.toLowerCase() === email && USERS[i].senha === senha && USERS[i].ativo) {
        u = USERS[i]; break;
      }
    }
    btn.disabled = false;
    btn.textContent = "Entrar";
    if (!u) { err.classList.add("show"); return; }
    CU = u;
    document.getElementById("LS").style.display = "none";
    document.getElementById("AS").style.display = "block";
    applyNav();
    var fp = "dashboard";
    if (u.role === "dentista") fp = "cashback";
    else {
      var pk = Object.keys(PERMS[u.role] || {});
      for (var j = 0; j < pk.length; j++) { if (PERMS[u.role][pk[j]]) { fp = pk[j]; break; } }
    }
    navTo(fp);
    toast("👋", "Bem-vindo(a), " + u.nome.split(" ")[0] + "!");
  }, 500);
}

function doLogout() {
  CU = null;
  document.getElementById("AS").style.display = "none";
  document.getElementById("LS").style.display = "flex";
  document.getElementById("lEmail").value = "";
  document.getElementById("lPass").value = "";
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
}

function canAcc(p) { return CU && !!((PERMS[CU.role] || {})[p]); }

function applyNav() {
  var u = CU;
  var av = document.getElementById("uAv");
  if (av) { av.style.background = u.bg; av.style.color = u.cor; av.textContent = u.ini; }
  var un = document.getElementById("uNmHdr");
  if (un) un.textContent = u.nome.split(" ").slice(0, 2).join(" ");
  var rb = document.getElementById("uRb");
  if (rb) { rb.textContent = RE[u.role] + " " + RL[u.role]; rb.className = "rb " + RC[u.role]; }
  document.querySelectorAll("#nav button").forEach(function(btn) {
    btn.style.display = (PERMS[u.role] || {})[btn.dataset.p] ? "" : "none";
  });
}

}

// ══ TOAST ══
var tT;
function toast(ico, msg) {
  document.getElementById("tIco").textContent = ico;
  document.getElementById("tMsg").textContent = msg;
  var t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(tT);

}

function openM(title, body, btns) {
  document.getElementById("MT").textContent = title;
  document.getElementById("MB2").innerHTML = body;
  var f = document.getElementById("MF"); f.innerHTML = "";
  (btns || []).forEach(function(b) {
    var btn = document.createElement("button");
    btn.className = "btn " + b.cls; btn.textContent = b.lbl; btn.onclick = b.fn;
    f.appendChild(btn);
  });
  document.getElementById("MO").classList.add("open");
}
function closeM() { document.getElementById("MO").classList.remove("open"); }
function closeMa() { document.getElementById("MA").classList.remove("open"); }

// ══ NAV ══
function navTo(page) {
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll("#nav button").forEach(function(b) { b.classList.remove("active"); });
  var pe = document.getElementById("page-" + page);
  if (pe) pe.classList.add("active");
  var nb = document.querySelector("#nav button[data-p='" + page + "']");
  if (nb) nb.classList.add("active");
  var map = {
    dashboard: rdash, agendar: ragendar, exames: rexames,
    convenios: rconv, cashback: rcash, dentistas: rdent,
    usuarios: rusrs, config: rcfg
  };
  if (map[page]) map[page]();
}
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("nav").addEventListener("click", function(e) {
    if (e.target.dataset.p) navTo(e.target.dataset.p);
  });
  document.getElementById("MO").addEventListener("click", function(e) {
    if (e.target === document.getElementById("MO")) closeM();
  });
  document.getElementById("lPass").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doLoginSupa();
  });
  document.getElementById("lEmail").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("lPass").focus();
  });
});

// ══ HELPERS ══
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pad(n) { return String(n).padStart(2,"0"); }
function fmtN(n) { return Number(n).toLocaleString("pt-BR"); }
function fex(id) { return exT.find(function(e){return e.id===id;}) || {n:id,ico:"🩻",pts:0,p:0}; }
function fdent(id) { return dents.find(function(d){return d.id===id;}); }
function fconv(id) { return convs.find(function(c){return c.id===id;}); }
function epreco(exId, cId) { var ex=fex(exId); var c=fconv(cId); return (c&&c.pr[exId])?c.pr[exId]:ex.p; }
function cpts(exId, nivel) { var ex=fex(exId); var b=(nlv[nivel]||nlv.Bronze).bonus; return Math.round(ex.pts*b); }
function waFmt(tpl,vars) { var s=tpl; for(var k in vars) s=s.split("{"+k+"}").join(vars[k]); return s; }
function waHtml(msg) { return esc(msg).replace(/\n/g,"<br>").replace(/\*(.*?)\*/g,"<strong>$1</strong>"); }

var agView = "dia";
var agBase = new Date();
var AGS = 7; var AGE = 19; var AGSZ = 40;
var ECS = {agendado:"ec0",realizado:"ec1",aguardando:"ec2",cancelado:"ec3"};

function setAgV(v) {
  agView=v;
  var bd=document.getElementById("agBD"); var bs=document.getElementById("agBS");
  if(bd) bd.classList.toggle("active",v==="dia");
  if(bs) bs.classList.toggle("active",v==="semana");
  rndAg();
}
function agNav(d) {
  var dt=new Date(agBase);
  if(agView==="dia") dt.setDate(dt.getDate()+d);
  else dt.setDate(dt.getDate()+d*7);
  agBase=dt; rndAg();
}
function agGoToday() {
  var t=new Date(); agBase=new Date(t.getFullYear(),t.getMonth(),t.getDate()); rndAg();
}
function agDays() {
  if(agView==="dia") return [new Date(agBase)];
  var days=[]; var d=new Date(agBase);
  var dw=d.getDay(); var diff=(dw===0)?-6:1-dw;
  d.setDate(d.getDate()+diff);
  for(var i=0;i<7;i++){days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}
function agF(d){return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function agFI(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function t2m(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function m2t(m){return pad(Math.floor(m/60))+":"+pad(m%60);}

function rndAg() {
  var gw=document.getElementById("agGW"); if(!gw) return;
  var days=agDays();
  var td=new Date(); var tds=agF(td);
  var dns=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  var dr=document.getElementById("agDR");
  if(dr){
    if(agView==="dia") dr.textContent=agF(days[0]);
    else dr.textContent=pad(days[0].getDate())+"/"+pad(days[0].getMonth()+1)+" a "+pad(days[6].getDate())+"/"+pad(days[6].getMonth()+1)+"/"+days[6].getFullYear();
  }
  var totalMins=(AGE-AGS)*60; var slots=totalMins/5;
  var h="<div style=\"display:flex\">";
  h+="<div class=\"ag-tc\"><div style=\"height:44px;border-bottom:1px solid rgba(255,255,255,.07)\"></div>";
  for(var i=0;i<slots;i++){
    var mm=AGS*60+i*5; var isH=(mm%60===0);
    h+="<div class=\"ag-ts"+(isH?"":" hf")+"\">"+(isH?m2t(mm):"")+"</div>";
  }
  h+="</div><div style=\"flex:1;display:flex\">";
  days.forEach(function(day){
    var ds=agF(day); var isT=(ds===tds);
    var dcls="ag-dh"+(isT?" tod":"");
    h+="<div class=\"ag-dc\">";
    h+="<div class=\""+dcls+"\"><div class=\"dw\">"+dns[day.getDay()]+"</div><div class=\"dd\">"+day.getDate()+"</div></div>";
    h+="<div style=\"position:relative\">";
    for(var i2=0;i2<slots;i2++){
      var mm2=AGS*60+i2*5; var hfcls=(mm2%30!==0)?" hf":"";
      var cd=agFI(day); var ct=m2t(mm2);
      h+="<div class=\"ag-cl"+hfcls+"\" style=\"height:"+AGSZ+"px\" onclick=\"agCC('"+cd+"','"+ct+"')\" ></div>";
    }
    var dayAgs=ags.filter(function(a){
      var dp=a.dt.split("/");
      return new Date(parseInt(dp[2]),parseInt(dp[1])-1,parseInt(dp[0])).toDateString()===day.toDateString();
    });
    dayAgs.forEach(function(a){
      var sm=t2m(a.hr); var dur=a.dur||30; var em2=sm+dur;
      var top2=((sm-AGS*60)/5)*AGSZ; var ht=Math.max((dur/5)*AGSZ,24);
      var ex2=fex(a.ex); var cv2=fconv(a.cv);
      var cl=ECS[a.st]||"ec0";
      h+="<div class=\"ag-ev "+cl+"\" style=\"top:"+top2+"px;height:"+ht+"px\" onclick=\"agEV("+a.id+")\">";
      h+="<div class=\"et\">"+esc(a.hr)+" - "+esc(m2t(em2))+" | <strong>"+esc(a.pac)+"</strong>"+(cv2?" ("+esc(cv2.n)+")":"")+"</div>";
      h+="<div class=\"es\">"+esc(ex2.n)+"</div>";
      if(a.st==="realizado") h+="<div class=\"eck\">&#10003;</div>";
      h+="</div>";
    });
    if(isT){var now3=new Date();var nm3=now3.getHours()*60+now3.getMinutes();if(nm3>=AGS*60&&nm3<AGE*60){var nt=((nm3-AGS*60)/5)*AGSZ;h+="<div class=\"ag-nl\" style=\"top:"+nt+"px\"></div>";}}
    h+="</div></div>";
  });
  h+="</div></div>";
  gw.innerHTML=h;
  gw.scrollTop=((8*60-AGS*60)/5)*AGSZ-60;
}

async function validarSenhaUsuarioAtual(senha){
  if(!CU || !CU.email || !senha) return false;

  var cli = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false
    }
  });

  var r = await cli.auth.signInWithPassword({
    email: CU.email,
    password: senha
  });

  if(r.error){
    console.error("validarSenhaUsuarioAtual:", r.error);
    return false;
  }

  await cli.auth.signOut();
  return true;
}

async function aplicarAjusteCashback(dentId){
  var tipo = document.getElementById("cbAjTipo").value;
  var pontos = parseInt(document.getElementById("cbAjPts").value || 0);
  var motivo = document.getElementById("cbAjMotivo").value.trim();
  var senha = document.getElementById("cbAjSenha").value;

  if(pontos <= 0){
    toast("⚠️","Informe uma quantidade válida");
    return;
  }

  if(!senha){
    toast("⚠️","Digite sua senha");
    return;
  }

  var okSenha = await validarSenhaUsuarioAtual(senha);
  if(!okSenha){
    toast("⚠️","Senha inválida");
    return;
  }

  var d = fdent(dentId);
  if(!d){
    toast("⚠️","Dentista não encontrado");
    return;
  }

  if(tipo === "debito" && (d.pts || 0) < pontos){
    toast("⚠️","Saldo insuficiente para desconto");
    return;
  }

  var novoSaldo = (d.pts || 0) + (tipo === "credito" ? pontos : -pontos);

  var hist = await supa.from("cashback_ajustes").insert({
    dentista_id: dentId,
    tipo: tipo,
    pontos: pontos,
    motivo: motivo || null,
    usuario_email: CU.email
  });

  if(hist.error){
    console.error("cashback_ajustes:", hist.error);
    toast("⚠️","Erro ao gravar histórico");
    return;
  }

  var upd = await supa.from("dentistas")
    .update({ pontos: novoSaldo })
    .eq("id", dentId);

  if(upd.error){
    console.error("aplicarAjusteCashback:", upd.error);
    toast("⚠️","Erro ao aplicar ajuste");
    return;
  }

  d.pts = novoSaldo;

  toast("✅", tipo === "credito" ? "Pontos adicionados" : "Pontos descontados");

  document.getElementById("cbAjPts").value = "";
  document.getElementById("cbAjMotivo").value = "";
  document.getElementById("cbAjSenha").value = "";

  rportal(dentId);
}

  var ed = eid ? USERS.find(function(u){ return u.email === eid || String(u.id) === String(eid); }) : null;
  var bgm = {admin:"linear-gradient(135deg,#4ab848,#7dcf6e)",agenda:"linear-gradient(135deg,#2dd4bf,#0d9488)",cashback:"linear-gradient(135deg,#a78bfa,#7c3aed)",dentista:"linear-gradient(135deg,#fbbf24,#f59e0b)"};
  var b = "<div style='display:flex;flex-direction:column;gap:10px'>";
  b += "<div class='field'><label>Nome completo</label><input id='usrNm' value='"+(ed?esc(ed.nome):"")+"' placeholder='Nome do usuario'></div>";
  b += "<div class='field'><label>Email (login)</label><input id='usrEm' type='email' value='"+(ed?esc(ed.email):"")+"' placeholder='usuario@cor.com.br'"+(ed?" readonly style='opacity:.6'":"")+" ></div>";
  b += "<div class='fg2'><div class='field'><label>Senha "+(ed?"(deixe em branco para manter)":"")+"</label><input id='usrSn' type='password' placeholder='"+(ed?"••••••••":"Nova senha")+"'></div>";
  b += "<div class='field'><label>Perfil de Acesso</label><select id='usrRl'>";
  Object.keys(RL).forEach(function(r){
    b += "<option value='"+r+"'"+(ed ? ed.role===r : r==="agenda" ? " selected" : "")+">"+RE[r]+" "+RL[r]+"</option>";
  });
  b += "</select></div></div>";
  b += "<div class='fg2'><div class='field'><label>Iniciais (2 letras)</label><input id='usrIn' value='"+(ed?esc(ed.ini):"")+"' placeholder='AB' maxlength='2'></div>";
  b += "<div class='field'><label>Status</label><select id='usrAt'><option value='true'"+(!ed||ed.ativo?" selected":"")+">Ativo</option><option value='false'"+(ed&&!ed.ativo?" selected":"")+">Inativo</option></select></div></div>";
  b += "</div>";

  openM(ed ? "Editar Usuário" : "Novo Usuário", b, [
    {lbl:"Cancelar", cls:"btno", fn:closeM},
    {lbl: ed ? "Salvar Alterações" : "Criar Usuário", cls:"btng", fn: async function(){
      try {
        var nm  = (document.getElementById("usrNm") && document.getElementById("usrNm").value || "").trim();
        var em  = ed ? String(ed.email || "").trim().toLowerCase() : (document.getElementById("usrEm") && document.getElementById("usrEm").value || "").trim().toLowerCase();
        var sn  = (document.getElementById("usrSn") && document.getElementById("usrSn").value) || "";
        var rl  = (document.getElementById("usrRl") && document.getElementById("usrRl").value) || "agenda";
        var at  = ((document.getElementById("usrAt") && document.getElementById("usrAt").value) || "true") === "true";
        var ini = (((document.getElementById("usrIn") && document.getElementById("usrIn").value) || "").toUpperCase()) ||
                  nm.split(" ").map(function(x){ return x[0] || ""; }).join("").slice(0,2).toUpperCase();

        if (!nm || !em) { toast("⚠️","Nome e email são obrigatórios"); return; }
        if (!ed && !sn)  { toast("⚠️","Informe uma senha para o novo usuário"); return; }

        var uObj;
        if (ed) {
          ed.nome  = nm;
          ed.role  = rl;
          ed.ini   = ini;
          ed.ativo = at;
          ed.bg    = bgm[rl] || ed.bg;
          if (sn) ed.senha = sn;
          uObj = ed;
        } else {
          uObj = {
            id: Date.now(), nome:nm, email:em, senha:sn,
            role:rl, ini:ini, bg:bgm[rl]||"linear-gradient(135deg,#4ab848,#7dcf6e)",
            cor:"#fff", ativo:at
          };
        }

        uObj.role = rl;
        uObj.ini  = ini;
        uObj.nome = nm;
        uObj.ativo = at;

        var ok = await dbSaveUser(uObj, sn, !ed);
        if (!ok) {
          toast("⚠️","Erro ao salvar usuário. Veja o console.");
          return;
        }

        await loadAllData();
        closeM();
        rusrs();
        toast("✅", nm + (ed ? " atualizado" : " criado"));
      } catch(e) {
        console.error("Erro inesperado ao salvar usuário:", e);
        toast("⚠️","Falha inesperada ao salvar usuário.");
      }
    }}
  ]);
}

function openExM(eid){var ed=eid?exT.find(function(e){return e.id===eid;}):null;var b="<div style='display:flex;flex-direction:column;gap:10px'><div class='fg2'><div class='field'><label>Nome</label><input id='eNm' value='"+(ed?esc(ed.n):"")+"' placeholder='Tomografia'></div><div class='field'><label>Icone</label><input id='eIco' value='"+(ed?ed.ico:"🩻")+"'></div></div><div class='fg2'><div class='field'><label>Preco Particular (R$)</label><input type='number' id='eP' value='"+(ed?ed.p:100)+"'></div><div class='field'><label>Pontos Cashback</label><input type='number' id='ePt' value='"+(ed?ed.pts:40)+"'></div></div></div>";openM(eid?"Editar Exame":"Novo Exame",b,[{lbl:"Cancelar",cls:"btno",fn:closeM},{lbl:eid?"Salvar":"Adicionar",cls:"btng",fn:function(){var nm=document.getElementById("eNm").value.trim();if(!nm){toast("⚠️","Informe o nome");return;}if(ed){ed.n=nm;ed.ico=document.getElementById("eIco").value;ed.p=parseInt(document.getElementById("eP").value)||100;ed.pts=parseInt(document.getElementById("ePt").value)||40;}else{exT.push({id:"e"+Date.now(),n:nm,ico:document.getElementById("eIco").value,p:parseInt(document.getElementById("eP").value)||100,pts:parseInt(document.getElementById("ePt").value)||40});}var exObj=eid?exT.find(function(e){return e.id===eid;}):exT[exT.length-1];dbSaveEx(exObj,!eid).then(function(){});var prObj=eid?prems.find(function(p){return p.id===eid;}):prems[prems.length-1];dbSavePrem(prObj,!eid).then(function(){});closeM();rcfg();toast("✅",nm+(eid?" atualizado":" adicionado"));}}]);}

function updAgSum(){
  var itens = getExamesSelecionados("pExames");
  var dId = parseInt(document.getElementById("dSel") ? document.getElementById("dSel").value : 0) || 0;

  if (!itens.length) {
    var el0 = document.getElementById("agSumDiv");
    if (el0) el0.innerHTML = "";
    return;
  }

  var total = 0;

  var linhas = itens.map(function(it){
    var ex = fex(it.exame_id);
    var cv = fconv(it.convenio_id || "");
    var pr = Number(it.preco || 0);

    total += pr;

    return {
      exame: ex ? ex.n : it.exame_id,
      convenio: cv ? cv.n : "Particular",
      preco: pr
    };
  });

  var d = fdent(dId);
  var pts = d ? calcCb(total, d.nv) : Math.round(total * (CASHBACK_PCT / 100));

  var el = document.getElementById("agSumDiv");
  if (!el) {
    el = document.createElement("div");
    el.id = "agSumDiv";
    el.style.cssText = "background:rgba(74,184,72,.08);border:1px solid rgba(74,184,72,.2);border-radius:8px;padding:12px;font-size:.82rem;margin-top:8px";
    var btn = document.querySelector("#agSd .btn.btng");
    if (btn) btn.parentNode.insertBefore(el, btn.nextSibling);
  }

  var html = "";
  linhas.forEach(function(l){
    html += "<div style='display:flex;justify-content:space-between;margin-bottom:4px;gap:10px'>" +
      "<span style='color:var(--gr);flex:1;min-width:0'>" + esc(l.exame) + " <span style='opacity:.8'>(" + esc(l.convenio) + ")</span></span>" +
      "<strong style='white-space:nowrap'>R$ " + l.preco.toFixed(2).replace('.', ',') + "</strong>" +
    "</div>";
  });

  html +=
    "<div style='display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08);padding-top:6px;margin-top:6px'><span style='color:var(--gr)'>Valor total:</span><strong style='color:var(--g)'>R$ " + total.toFixed(2).replace(".", ",") + "</strong></div>" +
    "<div style='display:flex;justify-content:space-between'><span style='color:var(--gr)'>Cashback:</span><strong style='color:var(--tl)'>+" + pts + " pts (" + CASHBACK_PCT + "%)</strong></div>";

  el.innerHTML = html;
}
function remU(email) {
  var u = USERS.find(function(x){ return x.email === email; });
  if (!u) return;
  openM("Remover Usuário",
    "<p style='color:var(--gr)'>Remover <strong>" + esc(u.nome) + "</strong>?</p>" +
    "<p style='font-size:.8rem;color:var(--or);margin-top:8px'>⚠️ O acesso ao sistema será bloqueado.</p>",
    [
      {lbl:"Cancelar", cls:"btno", fn:closeM},
      {lbl:"Remover", cls:"btnr", fn:function(){
        USERS = USERS.filter(function(x){ return x.email !== email; });
        supa.from("usuarios").update({ativo:false}).eq("email", email).then(function(){});
        closeM(); rusrs(); toast("🗑️", u.nome + " removido");
      }}
    ]
  );
}
