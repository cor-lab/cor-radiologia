<style>

/* LOGIN */
#LS{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:linear-gradient(135deg,#0d1830 0%,#12244e 50%,#0d2a1a 100%);
  position:fixed;inset:0;z-index:9999;}
#LS::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 60% at 20% 20%,rgba(74,184,72,.08),transparent 60%),
             radial-gradient(ellipse 50% 50% at 80% 80%,rgba(26,58,140,.15),transparent 60%);
  pointer-events:none;}
.lcrd{background:rgba(18,36,78,.94);border:1px solid rgba(74,184,72,.25);border-radius:22px;
  padding:44px 40px;width:100%;max-width:400px;backdrop-filter:blur(24px);
  box-shadow:0 28px 72px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);position:relative;z-index:1;animation:fup .4s ease;}
@keyframes fup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.llogo{text-align:center;margin-bottom:24px}
.llogo img{height:52px;width:auto;object-fit:contain}
.ldiv{height:1px;background:linear-gradient(90deg,transparent,rgba(74,184,72,.3),transparent);margin:16px 0}
.ltitle{font-family:"Playfair Display",serif;font-size:1.1rem;text-align:center;margin-bottom:4px}
.lsub{text-align:center;font-size:.8rem;color:var(--gr);margin-bottom:22px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lf label{font-size:.73rem;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.05em}
.lf input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:11px 13px;color:var(--wh);font-family:"DM Sans",sans-serif;font-size:.88rem;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.lf input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(74,184,72,.12)}
.lbtn{width:100%;padding:12px;margin-top:4px;background:linear-gradient(135deg,var(--g),var(--gl));
  border:none;border-radius:10px;cursor:pointer;font-family:"DM Sans",sans-serif;
  font-size:.92rem;font-weight:700;color:#fff;transition:all .2s;box-shadow:0 4px 16px rgba(74,184,72,.3);}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(74,184,72,.4)}
.lbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.lerr{background:rgba(224,82,82,.12);border:1px solid rgba(224,82,82,.25);border-radius:8px;
  padding:9px 13px;font-size:.81rem;color:#f87171;margin-top:10px;display:none;text-align:center;}
.lerr.show{display:block}
.dac{margin-top:20px;padding:13px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:10px;}
.dat{font-size:.7rem;font-weight:700;color:var(--gr);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:9px;text-align:center}
.dai{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;
  cursor:pointer;transition:background .14s;border-bottom:1px solid rgba(255,255,255,.05);}
.dai:last-child{border-bottom:none}
.dai:hover{background:rgba(255,255,255,.05)}
.rb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
  font-size:.69rem;font-weight:700;white-space:nowrap}
.rb-a{background:rgba(74,184,72,.15);color:#4ab848}
.rb-ag{background:rgba(45,212,191,.15);color:#2dd4bf}
.rb-c{background:rgba(167,139,250,.15);color:#a78bfa}
.rb-d{background:rgba(251,146,60,.15);color:#fb923c}
.dem{font-size:.75rem;color:var(--gr);font-family:"DM Mono",monospace;flex:1}
.dpw{font-size:.69rem;color:rgba(255,255,255,.25);font-family:"DM Mono",monospace}

/* APP */
#AS{display:none}
header{position:sticky;top:0;z-index:200;background:rgba(13,24,48,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(74,184,72,.12);padding:0 24px;display:flex;
  align-items:center;justify-content:space-between;height:62px;gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hlogo img{height:36px;width:auto;object-fit:contain}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav button{background:none;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;
  font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:500;color:var(--gr);transition:all .18s}
nav button:hover{color:var(--wh);background:rgba(255,255,255,.06)}
nav button.active{color:var(--g);background:rgba(74,184,72,.1);font-weight:600}
.hr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.upill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 11px;}
.uav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.68rem;flex-shrink:0}
.uname{font-size:.78rem;font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logoutb{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.2);border-radius:7px;
  padding:5px 10px;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.74rem;
  font-weight:600;color:#f87171;transition:all .15s;}
.logoutb:hover{background:rgba(224,82,82,.2)}

/* PAGES */
.page{display:none;position:relative;z-index:1}
.page.active{display:block}
.pi{padding:24px 28px}
.pg-scroll{max-height:calc(100vh - 70px);overflow-y:auto}
.card{background:rgba(18,36,78,.7);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;
  box-shadow:0 4px 16px rgba(0,0,0,.15)}
.card-sm{padding:14px 18px}
.ctitle{font-family:"Playfair Display",serif;font-size:1.05rem;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;
  cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:600;
  transition:all .18s;border:none;white-space:nowrap}
.btng{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;box-shadow:0 2px 10px rgba(74,184,72,.2)}
.btng:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,184,72,.35)}
.btno{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--wh)}
.btno:hover{background:rgba(255,255,255,.1)}
.btnr{background:rgba(224,82,82,.12);border:1px solid rgba(224,82,82,.22);color:#f87171}
.btnr:hover{background:rgba(224,82,82,.2)}
.btnt{background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.28);color:var(--tl)}
.bsm{padding:5px 11px;font-size:.76rem}
.bico{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.74rem;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:9px;padding:11px 13px;color:var(--wh);font-family:"DM Sans",sans-serif;
  font-size:.88rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(74,184,72,.1)}
.field select option{background:#12244e}
.field textarea{resize:vertical;min-height:68px}
.field input[type=color]{padding:3px 6px;height:36px;cursor:pointer}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 13px;font-size:.71rem;font-weight:700;color:var(--gr);
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{font-size:.73rem;font-weight:700;padding:4px 11px;border-radius:20px;display:inline-block;white-space:nowrap;letter-spacing:.02em}
.bg{background:rgba(74,184,72,.15);color:var(--g)}
.bt{background:rgba(45,212,191,.15);color:var(--tl)}
.br{background:rgba(224,82,82,.15);color:#f87171}
.bo{background:rgba(251,146,60,.15);color:var(--or)}
.bgo{background:rgba(201,168,76,.15);color:#c9a84c}
.bgr{background:rgba(255,255,255,.08);color:var(--gr)}
.bp{background:rgba(167,139,250,.15);color:var(--pu)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.sc{background:rgba(18,36,78,.75);border:1px solid rgba(255,255,255,.08);border-radius:14px;
  padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.sc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--g))}
.si{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:19px;margin-bottom:12px;background:rgba(255,255,255,.06)}
.sv{font-family:"Playfair Display",serif;font-size:1.9rem;font-weight:700;line-height:1;margin-bottom:3px}
.sl{font-size:.76rem;color:var(--gr);font-weight:500}
.sch{margin-top:8px;font-size:.73rem;font-weight:600;color:var(--g)}
/* Modal */
.mo{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mb{background:linear-gradient(165deg,rgba(18,36,78,.99),rgba(13,24,48,.99));border:1px solid rgba(74,184,72,.22);border-radius:18px;
  padding:32px;width:100%;max-width:600px;animation:mIn .25s ease;max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04)}
.mb.msm{max-width:400px;text-align:center}
@keyframes mIn{from{transform:scale(.92) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.07)}
.mt{font-family:"Playfair Display",serif;font-size:1.2rem}
.mx{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--gr);cursor:pointer;font-size:1.1rem;padding:4px 10px;border-radius:8px;transition:all .15s}
.mx:hover{color:var(--wh);background:rgba(255,255,255,.12)}
.mf{display:flex;gap:8px;justify-content:center;margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07);flex-wrap:wrap}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(18,36,78,.98);
  border:1px solid rgba(74,184,72,.3);border-radius:12px;padding:13px 18px;
  display:flex;align-items:center;gap:10px;transform:translateY(14px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;min-width:240px;
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.04)}
.toast.show{transform:translateY(0);opacity:1}
/* Search */
.sr{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sw{flex:1;min-width:200px;position:relative}
.sw input{padding-left:36px}
.swi{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gr);pointer-events:none}
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ftab{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:600;
  transition:all .14s;border:1px solid rgba(255,255,255,.1);color:var(--gr);background:rgba(255,255,255,.04)}
.ftab:hover{border-color:rgba(74,184,72,.4);color:var(--g)}
.ftab.active{background:rgba(74,184,72,.15);border-color:var(--g);color:var(--g)}
/* Calendar */
.cw{display:grid;grid-template-columns:1fr 320px;gap:20px}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cmn{font-family:"Playfair Display",serif;font-size:1.05rem}
.cnv{display:flex;gap:5px}
.cnb{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);color:var(--wh);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .14s}
.cnb:hover{background:rgba(74,184,72,.2);border-color:var(--g)}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cdn{text-align:center;font-size:.67rem;font-weight:700;color:var(--gr);
  padding:5px 0;text-transform:uppercase;letter-spacing:.04em}
.cd{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;transition:all .13s;font-size:.82rem;font-weight:500;gap:2px}
.cd:hover:not(.emp){background:rgba(255,255,255,.07)}
.cd.emp{cursor:default;color:var(--gr);opacity:.22}
.cd.tod{background:rgba(74,184,72,.12);border:1px solid rgba(74,184,72,.35);color:var(--g)}
.cd.sel{background:var(--g)!important;color:#fff!important}
.cd.pas{opacity:.35;pointer-events:none}
.sgr{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.slot{padding:8px 4px;border-radius:7px;text-align:center;font-size:.77rem;font-weight:600;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  transition:all .13s;font-family:"DM Mono",monospace}
.slot:hover:not(.busy){border-color:var(--g);color:var(--g)}
.slot.busy{color:var(--gr);opacity:.32;cursor:not-allowed;text-decoration:line-through}
.slot.sel{background:rgba(74,184,72,.18);border-color:var(--g);color:var(--g)}
.exgr{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.exop{padding:10px 7px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);text-align:center;transition:all .13s;font-size:.78rem;font-weight:500}
.exop:hover{border-color:rgba(74,184,72,.4)}
.exop.sel{background:rgba(74,184,72,.15);border-color:var(--g);color:var(--g)}
.exico{font-size:1.15rem;margin-bottom:3px}
.exprice{font-size:.7rem;color:var(--gr);margin-top:2px}
.smb{background:rgba(74,184,72,.07);border:1px solid rgba(74,184,72,.18);border-radius:9px;padding:14px}
.smr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.84rem}
.smt{font-weight:700;color:var(--g);margin-top:6px;padding-top:6px;border-top:1px solid rgba(74,184,72,.18)}
.cbn{background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.18);border-radius:7px;
  padding:8px 12px;font-size:.79rem;color:var(--tl);display:flex;align-items:center;gap:6px;margin-top:8px}
/* Portal */
.ph{background:linear-gradient(135deg,rgba(26,58,140,.5),rgba(18,36,78,.9));
  border:1px solid rgba(74,184,72,.22);border-radius:14px;padding:28px;
  display:grid;grid-template-columns:1fr auto;gap:24px;margin-bottom:20px;position:relative;overflow:hidden}
.ph::after{content:"◆";position:absolute;right:50px;top:-20px;font-size:140px;
  color:rgba(74,184,72,.04);line-height:1;pointer-events:none}
.dpf{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.dav{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;flex-shrink:0;border:3px solid rgba(74,184,72,.35)}
.di h2{font-family:"Playfair Display",serif;font-size:1.28rem}
.di p{color:var(--gr);font-size:.84rem;margin-top:3px}
.lvc{display:inline-flex;align-items:center;gap:5px;background:rgba(74,184,72,.14);
  border:1px solid rgba(74,184,72,.28);border-radius:20px;padding:3px 10px;
  font-size:.73rem;font-weight:700;color:var(--g);margin-top:6px}
.pgbg{background:rgba(255,255,255,.08);border-radius:20px;height:6px;overflow:hidden}
.pgfl{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--g),var(--gl));transition:width .8s ease}
.cp{text-align:center;background:rgba(74,184,72,.08);border:1px solid rgba(74,184,72,.18);
  border-radius:11px;padding:20px 26px;align-self:flex-start}
.cbig{font-family:"Playfair Display",serif;font-size:2.6rem;color:var(--g);line-height:1}
.clbl{font-size:.7rem;color:var(--gr);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.cval{font-size:.86rem;color:var(--tl);margin-top:6px;font-weight:600}
.rwgr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rwcd{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:9px;
  padding:14px;cursor:pointer;transition:all .17s;display:flex;flex-direction:column;gap:5px;position:relative}
.rwcd:hover:not(.lkd){border-color:rgba(74,184,72,.35);background:rgba(74,184,72,.05)}
.rwcd.lkd{opacity:.45}
.ric{font-size:1.4rem}
.rn{font-size:.86rem;font-weight:600}
.rd{font-size:.74rem;color:var(--gr)}
.rft{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.rpt{font-family:"DM Mono",monospace;font-size:.82rem;color:var(--g);font-weight:700}
.lki{position:absolute;top:9px;right:9px;font-size:.78rem;color:var(--gr)}
.ei{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ei:last-child{border-bottom:none}
.eico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.einfo{flex:1}
.edesc{font-size:.85rem;font-weight:500}
.edate{font-size:.72rem;color:var(--gr);margin-top:2px}
.epts{font-family:"DM Mono",monospace;font-weight:700;font-size:.9rem}
.pp{color:var(--g)}.pm{color:#f87171}
/* Rank */
.ri{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ri:last-child{border-bottom:none}
.rn2{font-family:"DM Mono",monospace;font-size:.83rem;color:var(--gr);min-width:20px;text-align:center}
.rav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.rin{flex:1}
.rnm{font-size:.86rem;font-weight:500}
.rsb{font-size:.72rem;color:var(--gr)}
.rpts{font-family:"DM Mono",monospace;font-size:.86rem;color:var(--g);font-weight:700}
/* Config items */
.citm{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.citm:last-child{border-bottom:none}
.cinf{flex:1}
.cinm{font-size:.86rem;font-weight:500}
.cisb{font-size:.73rem;color:var(--gr);margin-top:2px}
.cact{display:flex;gap:5px;align-items:center}
/* Convenios */
.ccrd{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  padding:14px;
  display:grid;
  grid-template-columns:42px minmax(0,1fr) auto;
  align-items:center;
  gap:12px;
  transition:all .17s;
  cursor:pointer;
  height:70px;
}
.ccrd:hover{border-color:rgba(74,184,72,.25)}
.ccrd.sel{border-color:var(--g);background:rgba(74,184,72,.07)}
.clog{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.cnfo{flex:1}
.cnm{font-size:.88rem;font-weight:600}
.cds{font-size:.74rem;color:var(--gr);margin-top:2px}
.cgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px;
  align-items:stretch;
}
.cfgs{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.wapv{background:#0f1e0f;border:1px solid rgba(74,184,72,.2);border-radius:10px;
  padding:14px;font-family:"DM Mono",monospace;font-size:.8rem;line-height:1.6;color:#a8d8a8;margin-top:10px}
.wabl{background:#1a3a1a;border-radius:12px 12px 12px 2px;padding:11px 13px;
  display:inline-block;max-width:100%;white-space:pre-wrap;font-size:.8rem;line-height:1.5}
/* Usuarios */
.adeny{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:14px;text-align:center;color:var(--gr)}
.adeny .adi{font-size:2.8rem}
.adeny h3{font-family:"Playfair Display",serif;font-size:1.05rem;color:var(--wh)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
@media(max-width:1080px){.stats-row{grid-template-columns:1fr 1fr}.cw{grid-template-columns:1fr}.cfgs{grid-template-columns:1fr}.ph{grid-template-columns:1fr}.rwgr{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.fg2,.fg3{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.exgr{grid-template-columns:1fr 1fr}.rwgr{grid-template-columns:1fr}}

/* ══ AGENDA CALENDÁRIO ══ */
.ag-toolbar{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap;background:rgba(18,36,78,.6);backdrop-filter:blur(8px)}
.ag-nav button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--wh);cursor:pointer;border-radius:7px;padding:6px 11px;font-size:.82rem;font-weight:700;transition:all .15s;margin-right:4px;font-family:"DM Sans",sans-serif}
.ag-nav button:hover{background:rgba(74,184,72,.2);border-color:var(--g)}
.ag-tbtn{background:linear-gradient(135deg,var(--g),var(--gl))!important;color:#fff!important;border-color:transparent!important}
.ag-dr{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--wh);border-radius:7px;padding:6px 12px;font-family:"DM Sans",sans-serif;font-size:.82rem}
.ag-vb{display:flex;border:1px solid rgba(255,255,255,.12);border-radius:8px;overflow:hidden;margin-left:auto}
.ag-vb button{background:rgba(255,255,255,.04);border:none;color:var(--gr);cursor:pointer;padding:6px 18px;font-size:.82rem;font-weight:700;transition:all .15s;border-right:1px solid rgba(255,255,255,.08);font-family:"DM Sans",sans-serif}
.ag-vb button:last-child{border-right:none}

var SUPA_URL = "https://flpvzvtbhuyjjdqyrsza.supabase.co";
var SUPA_KEY = "sb_publishable_EWmUEcw77PcCJDyZ6i2xMg_d5Ode_SM";
var supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ═══ FONTE ÚNICA DE VERDADE PARA CÁLCULO DE VALORES DE AGENDAMENTO ═══
// Sempre que precisar calcular bruto/faturado/desconto de um agendamento,
// USE ESTA FUNÇÃO. Evita bugs de mistos (particular + convênio) onde
// agendamentos.valor_bruto só guarda a parte particular.
//
// Regras:
//   BRUTO:    se tem itens, soma item.preco de todos. Senão, valor_bruto salvo.
//   DESCONTO: fonte de verdade é desconto_valor SALVO.
//             desconto_percentual é IGNORADO se desc_valor=0 (lixo de form default).
//             Se desc_valor=0 mas valor_faturado > 0 E < bruto, usa diff.
//   FATURADO: bruto - desconto.
//
// Retorna: { bruto, faturado, desconto, descontoPct }
window.calcValoresAg = function(ag){
  if(!ag) return { bruto:0, faturado:0, desconto:0, descontoPct:0 };
  var itens = ag.exames || ag.itens || [];
  var bruto = 0;

  if(itens.length > 0){
    // SEMPRE soma pelos exames quando há itens (verdade absoluta para mistos)
    itens.forEach(function(it){ bruto += Number(it.preco || 0); });
  } else {
    // Fallback: usa valor_bruto salvo no agendamento
    bruto = Number(ag.valor_bruto || ag.vl || ag.valor || 0);
  }

  var descontoPct = Number(ag.desconto_percentual || 0);
  var desconto = Number(ag.desconto_valor || 0);
  var vfSalvo = Number(ag.valor_faturado || 0);
  var faturado;

  if(desconto > 0){
    // Desconto real salvo - fonte de verdade
    faturado = bruto - desconto;
  } else if(vfSalvo > 0 && vfSalvo < bruto - 0.01){
    // Sem desc_valor mas vf salvo indica desconto
    // (protege mistos: vf=só particular < bruto=particular+convênio, NÃO é desconto)
    // Só considera desconto se diff for razoável (até 50% do bruto)
    var diff = bruto - vfSalvo;
    if(diff < bruto * 0.5){
      desconto = diff;
      faturado = vfSalvo;
    } else {
      // Diff grande: é caso misto (vf só tem particular), não desconto
      desconto = 0;
      faturado = bruto;
    }
  } else {
    // Sem desconto: ignora desc_pct (lixo de form default em convênio puro)
    desconto = 0;
    faturado = bruto;
  }

  return {
    bruto: Number(bruto.toFixed(2)),
    faturado: Number(faturado.toFixed(2)),
    desconto: Number(desconto.toFixed(2)),
    descontoPct: descontoPct
  };
};

// ═══ HELPER GLOBAL: fetch autenticado ao Supabase REST API ═══
// Usa JWT do usuário logado (authenticated) ao invés da publishable key (anon)
// Essencial pois as RLS exigem role authenticated pra SELECT/INSERT/UPDATE/DELETE
// Uso: await supaFetch("/rest/v1/tabela?select=*", {method:"GET"})
window.supaFetch = async function(path, opts){
  opts = opts || {};
  var headers = Object.assign({}, opts.headers || {});
  var token = SUPA_KEY;
  try {
    if(supa && supa.auth && supa.auth.getSession){
      var sess = await supa.auth.getSession();
      if(sess && sess.data && sess.data.session && sess.data.session.access_token){
        var s = sess.data.session;
        var now = Math.floor(Date.now()/1000);
        // Refresh proativo se faltar < 2 min pra expirar
        if(s.expires_at && (s.expires_at - now) < 120){
          try {
            var r = await supa.auth.refreshSession();
            if(r && r.data && r.data.session) token = r.data.session.access_token;
            else token = s.access_token;
          } catch(_){ token = s.access_token; }
        } else {
          token = s.access_token;
        }
      }
    }
  } catch(_){}
  headers["apikey"] = SUPA_KEY;
  headers["Authorization"] = "Bearer " + token;
  opts.headers = headers;
  var url = path.indexOf("http") === 0 ? path : (SUPA_URL + path);
  return fetch(url, opts);
};

/**
 * Gera ou reaproveita token numérico de 6 dígitos para acesso do paciente.
 * Idempotente: se já existe token ativo para o SEQATEND, retorna o mesmo.
 */
async function gerarTokenAcessoPaciente(ag) {
  if (!ag || !ag.firebird_seq_atend) {
    throw new Error("Agendamento ainda não tem SEQATEND (sync Firebird pendente).");
  }
  // Reaproveita token ativo existente
  var existentes = await supa
    .from("acesso_paciente_tokens")
    .select("token, ativo")
    .eq("fb_seq_atend", ag.firebird_seq_atend)
    .eq("ativo", true)
    .limit(1);
  if (existentes.error) throw existentes.error;
  if (existentes.data && existentes.data.length > 0) {
    return existentes.data[0].token;
  }
  // Gera token único (até 5 tentativas contra colisão)
  var createdBy = (typeof CU !== "undefined" && CU && CU.id) ? CU.id : null;
  for (var t = 0; t < 5; t++) {
    var token = String(Math.floor(100000 + Math.random() * 900000));
    var ins = await supa
      .from("acesso_paciente_tokens")
      .insert({
        token: token,
        fb_seq_atend: ag.firebird_seq_atend,
        fb_atend_id: ag.firebird_atend_id || null,
        paciente_id: ag.pId || null,
        paciente_nome: ag.pac || null,
        ativo: true,
        created_by: createdBy
      })
      .select("token")
      .single();
    if (!ins.error) return ins.data.token;
    if (ins.error.code !== "23505") throw ins.error; // 23505 = unique violation
  }
  throw new Error("Não foi possível gerar token único após 5 tentativas.");
}

/** Revoga todos os tokens ativos de um SEQATEND (ex: botão "Revogar acesso"). */
async function revogarTokenPaciente(seqatend, motivo) {
  var revokedBy = (typeof CU !== "undefined" && CU && CU.id) ? CU.id : null;
  var r = await supa
    .from("acesso_paciente_tokens")
    .update({
      ativo: false,
      revoked_at: new Date().toISOString(),
      revoked_by: revokedBy,
      revoke_reason: motivo || null
    })
    .eq("fb_seq_atend", seqatend)
    .eq("ativo", true);
  if (r.error) throw r.error;
  return true;
}

/** Busca o token ativo de um atendimento (pra exibir no modal). */
async function buscarTokenPaciente(seqatend) {
  var r = await supa
    .from("acesso_paciente_tokens")
    .select("token, ativo, created_at, ultimo_acesso_em, acessos_count")
    .eq("fb_seq_atend", seqatend)
    .eq("ativo", true)
    .order("created_at", { ascending: false })
    .limit(1);
  if (r.error) throw r.error;
  return (r.data && r.data[0]) ? r.data[0] : null;
}

function toggleExame(idBase, exId, onChangeFn){
  var root = document.getElementById(idBase);
  if(!root) return;

  var row = root.querySelector("[data-exame='" + exId + "']");
  if(!row) return;

  var ck = row.querySelector("input[type='checkbox']");
  var sl = row.querySelector("select");
  var ip = row.querySelector("input[type='number']");
  var marcado = !!(ck && ck.checked);

  if(sl) sl.disabled = !marcado;
  if(ip) ip.disabled = !marcado;

  if(marcado){
    // Auto-selecionar convênio ao marcar exame
    if(sl) {
      var opcoes = sl.querySelectorAll("option[value]");
      var opcoesComValor = [];
      for(var i=0; i<opcoes.length; i++){
        if(opcoes[i].value) opcoesComValor.push(opcoes[i]);
      }
      // Se nome do exame contém "(CONVENIO)", auto-selecionar esse convênio
      var rowEl = sl.closest("[data-exame]");
      var nomeExame = rowEl ? (rowEl.getAttribute("data-nome") || "") : "";
      var matchConv = nomeExame.match(/\(([^)]+)\)/);
      if(!sl.value && matchConv){
        var convHint = matchConv[1].toUpperCase().trim();
        for(var j=0; j<opcoesComValor.length; j++){
          if(opcoesComValor[j].textContent.toUpperCase().indexOf(convHint) >= 0){
            sl.value = opcoesComValor[j].value;
            break;
          }
        }
      }
      // Se ainda não selecionou e só tem 1 opção, auto-selecionar
      if(opcoesComValor.length === 1 && !sl.value){
        sl.value = opcoesComValor[0].value;
      }
      if(!sl.value) sl.value = "";
    }
    if(ip){
      var ex = fex(exId);
      // Se convênio selecionado, usar preço do convênio
      if(sl && sl.value){
        var cvObj = fconv(sl.value);
        if(cvObj && cvObj.pr && cvObj.pr[exId] !== undefined){
          ip.value = Number(cvObj.pr[exId]).toFixed(2);
        } else if(!ip.value || Number(ip.value) <= 0){
          ip.value = Number(ex ? ex.p || 0 : 0).toFixed(2);
        }
      } else if(!ip.value || Number(ip.value) <= 0){
        ip.value = Number(ex ? ex.p || 0 : 0).toFixed(2);
      }
    }
  }else{
    if(sl) sl.value = "";
    if(ip){
      var ex2 = fex(exId);
      ip.value = Number(ex2 ? ex2.p || 0 : 0).toFixed(2);
    }
  }

  if(typeof window[onChangeFn] === "function"){
    window[onChangeFn]();
  }
}
function getExamesSelecionados(idBase){
  var root = document.getElementById(idBase);
  if(!root) return [];

  var itens = [];

  root.querySelectorAll("[data-exame]").forEach(function(row){
    var exId = row.getAttribute("data-exame");
    var ck = row.querySelector("input[type='checkbox']");
    if(!ck || !ck.checked) return;

    var sl = row.querySelector("select");
    var ip = row.querySelector("input[type='number']");

    itens.push({
      exame_id: exId,
      convenio_id: sl ? (sl.value || "") : "",
      preco: ip ? Number(ip.value || 0) : 0
    });
  });

  return itens;
}

function filtrarExames(inp, idBase){
  var termo = String((inp && inp.value) || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();

  var root = document.getElementById(idBase);
  if(!root) return;

  var rows = Array.from(root.querySelectorAll("[data-exame]"));

  rows.forEach(function(row){
    var nome = String(row.getAttribute("data-nome") || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");

    var match = !termo || nome.indexOf(termo) >= 0;
    row.style.display = match ? "grid" : "none";

    var score = 9999;
    if(match){
      if(nome.indexOf(termo) === 0) score = 0;       // começa com o termo
      else score = nome.indexOf(termo);              // aparece depois
    }
    row.dataset.score = String(score);

  }, 15000);

function normalizarCpfCnpj(v){
  return String(v || "").replace(/\D/g, "");
}
function soDigitos(v){
  return String(v || "").replace(/\D+/g, "");
}

function validarCPF(cpf){
  cpf = soDigitos(cpf);

  if (!cpf || cpf.length !== 11) return false;
  if (/^(\d)\1{10}$/.test(cpf)) return false;

  var soma = 0;
  var resto = 0;
  var i = 0;

  for (i = 0; i < 9; i++) {
    soma += parseInt(cpf.charAt(i), 10) * (10 - i);
  }

  resto = 11 - (soma % 11);
  if (resto >= 10) resto = 0;
  if (resto !== parseInt(cpf.charAt(9), 10)) return false;

  soma = 0;
  for (i = 0; i < 10; i++) {
    soma += parseInt(cpf.charAt(i), 10) * (11 - i);
  }

  resto = 11 - (soma % 11);
  if (resto >= 10) resto = 0;
  if (resto !== parseInt(cpf.charAt(10), 10)) return false;

  return true;
}

function formatarCPF(cpf){
  cpf = soDigitos(cpf);
  if (cpf.length !== 11) return cpf;
  return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
}

  try{

async function loadAllData(){
  try{
    var r = await Promise.all([
      supa.from("exames_tipos").select("*").eq("ativo",true).order("nome"),
      supa.from("convenios").select("*").eq("ativo",true).order("nome"),
      supa.from("convenio_precos").select("*").limit(5000),
      supa.from("dentistas").select("*").eq("ativo",true).order("nome").range(0,999),
      supa.from("agendamentos").select("*").order("data_exame",{ascending:false}).limit(500),
      supa.from("agendamento_exames").select("*").order("ordem",{ascending:true}),
      supa.from("premios").select("*").eq("ativo",true).order("pontos_necessarios"),
      supa.from("usuarios").select("*").eq("ativo",true).order("nome"),
      supa.from("cashback_ajustes").select("*").order("created_at",{ascending:false}),
      supa.from("dentista_enderecos").select("*").order("id")
    ]);

    var exR = r[0], cvR = r[1], cpR = r[2], dR = r[3], agR = r[4], agexR = r[5], prR = r[6], usR = r[7], ajR = r[8], deR = r[9];

    // Buscar dentistas restantes (paginado)
    var allDents = dR.data || [];
    if(allDents.length >= 999){
      var pg = 1;
      while(true){
        var dr2 = await supa.from("dentistas").select("*").eq("ativo",true).order("nome").range(pg*1000, pg*1000+999);
        if(!dr2.data || !dr2.data.length) break;
        allDents = allDents.concat(dr2.data);
        pg++;
        if(pg > 10) break;
      }
      dR = {data: allDents, error: null};
    }

    AJUSTES_CB = ajR.data || [];
    
    if(exR.data && exR.data.length){
      exT = exR.data.map(function(e){
        return {
          id: e.id,
          n: e.nome,
          ico: e.icone || "🩻",
          p: parseFloat(e.preco_particular || 0),
          pts: e.pontos_cashback || 0
        };
      });
    }

    if(cvR.data){
      var pm = {};
      (cpR.data || []).forEach(function(cp){
        if(!pm[cp.convenio_id]) pm[cp.convenio_id] = {};
        pm[cp.convenio_id][cp.exame_id] = parseFloat(cp.preco || 0);
      });

      convs = cvR.data.map(function(c){
        var nm2 = {};
        (cpR.data || []).forEach(function(cp){
          if(cp.convenio_id === c.id && cp.nome_convenio) nm2[cp.exame_id] = cp.nome_convenio;
        });

        return {
          id: c.id,
          n: c.nome,
          ico: c.icone || "💊",
          ds: c.descricao || "",
          cl: c.cor || "#4ab848",
          pr: pm[c.id] || {},
          nomes: nm2
        };
      });
    }

    if(dR.data && dR.data.length){
      dents = dR.data.map(function(d){
        return {
          id: d.id,
          fid: d.firebird_id || null,
          n: d.nome,
          cro: d.cro || "",
          esp: d.especialidade || "",
          tel: d.telefone || "",
          nv: d.nivel || "Bronze",
          pts: d.pontos || 0,
          ind: d.indicacoes || 0,
          ini: d.ini || d.nome.substring(0,2).toUpperCase(),
          bg: d.bg || "linear-gradient(135deg,#4ab848,#7dcf6e)",
          cor: d.cor || "#fff",
          pvpf: d.pode_ver_pontos_fotonweb === true
        };
      });

      // Mapear enderecos dos dentistas (primeiro endereco de cada)
      var dentEndMap = {};
      (deR.data || []).forEach(function(e){
        if (!dentEndMap[e.dentista_id]) {
          dentEndMap[e.dentista_id] = (e.endereco || "") + (e.bairro ? ", " + e.bairro : "");
        }
      });
      dents.forEach(function(d){ d.end = dentEndMap[d.id] || ""; });
    }

    var mapAgEx = {};
    (agexR.data || []).forEach(function(x){
      if(!mapAgEx[x.agendamento_id]) mapAgEx[x.agendamento_id] = [];
      mapAgEx[x.agendamento_id].push({
        exame_id: x.exame_id,
        convenio_id: x.convenio_id || "",
        preco: parseFloat(x.preco || 0),
        nome_exame: x.nome_exame || "",
        ordem: x.ordem || 0
      });
    });

    if(agR.data && agR.data.length){
      ags = agR.data.map(function(a){
        var itens = mapAgEx[a.id] || [];

        if(!itens.length && a.exame_id){
          itens = [{
            exame_id: a.exame_id,
            convenio_id: a.convenio_id || "",
            preco: parseFloat(a.valor || 0),
            nome_exame: "",
            ordem: 1
          }];
        }

        itens.sort(function(x, y){
          return (x.ordem || 0) - (y.ordem || 0);
        });

        return {
          id: a.id,
          pac: a.paciente_nome,
          tel: a.paciente_tel || "",
          paciente_cpf: a.paciente_cpf || "",
          paciente_cnpj: a.paciente_cnpj || "",
          paciente_email: a.paciente_email || "",
          paciente_cep: a.paciente_cep || "",
          paciente_logradouro: a.paciente_logradouro || "",
          paciente_numero: a.paciente_numero || "",
          paciente_complemento: a.paciente_complemento || "",
          paciente_bairro: a.paciente_bairro || "",
          paciente_municipio: a.paciente_municipio || "",
          paciente_uf: a.paciente_uf || "",

          ex: a.exame_id,
          exames: itens,
          dt: iso2br(a.data_exame),
          hr: (a.hora_exame || "08:00").substring(0,5),
          dur: a.duracao || 30,
          dId: a.dentista_id,
          cv: a.convenio_id || "",

          vl: parseFloat(a.valor || 0),
          valor_bruto: parseFloat(a.valor_bruto || a.valor || 0),
          desconto_percentual: Number(a.desconto_percentual || 0),
          desconto_valor: Number(a.desconto_valor || 0),
          valor_faturado: parseFloat(a.valor_faturado || a.valor || 0),

          forma_pagamento_prevista: a.forma_pagamento_prevista || "avista",
          forma_pagamento_final: a.forma_pagamento_final || "",

          cb: a.cashback_pts || 0,

          st: a.status || "agendado",
          status: a.status || "agendado",
          status_clinico: a.status_clinico || a.status || "agendado",
          status_fiscal: a.status_fiscal || "nao_emitida",

          nfse_id: a.nfse_id || null,
          numero_nfse: a.numero_nfse || null,
          focus_reference: a.focus_reference || null,
          pode_pontuar: a.pode_pontuar === true
          ,firebird_sync: a.firebird_sync || null
          ,firebird_atend_id: a.firebird_atend_id || null
          ,firebird_seq_atend: a.firebird_seq_atend || null
          ,obs: a.observacoes || ''
          ,observacoes: a.observacoes || ''
          ,forma_entrega: a.forma_entrega || null
          ,previsao_entrega: a.previsao_entrega || null
          ,paciente_data_nascimento: a.paciente_data_nascimento || ''
          ,paciente_sexo: a.paciente_sexo || ''
        };
      });
    }

    if(prR.data && prR.data.length){
      prems = prR.data.map(function(p){
        return {
          id: p.id,
          n: p.nome,
          ds: p.descricao || "",
          ico: p.icone || "🎁",
          pts: p.pontos_necessarios
        };
      });
    }

    if(usR.data && usR.data.length){
      USERS = usR.data.map(function(u){
        return {
          id: u.id,
          nome: u.nome,
          email: u.email,
          senha: "****",
          role: u.role || "agenda",
          ini: u.ini || "XX",
          bg: u.bg || "linear-gradient(135deg,#4ab848,#7dcf6e)",
          cor: u.cor || "#fff",
          ativo: u.ativo !== false,
          dentId: u.dent_id
        };
      });
    }

    console.log(
      "Loaded: ex=" + exT.length +
      " cv=" + convs.length +
      " dt=" + dents.length +
      " ag=" + ags.length +
      " agex=" + (agexR.data || []).length +
      " pr=" + prems.length +
      " us=" + USERS.length
    );
  }catch(e){
    console.error("loadAllData:", e);
  }
}

async function creditarCashbackSeElegivel(agendamentoId){
  try{
    
    var agDb = await supa.from("agendamentos")
      .select("id, dentista_id, cashback_pts, status_clinico, status_fiscal, nfse_id")
      .eq("id", agendamentoId)
      .single();

    if(agDb.error || !agDb.data) return false;

    var row = agDb.data;

    if(row.status_clinico !== "realizado") return false;
    if(row.status_fiscal !== "emitida") return false;
    if(!row.nfse_id) return false;

    var jaLancado = await supa.from("cashback_lancamentos")
      .select("id")
      .eq("agendamento_id", agendamentoId)
      .eq("tipo", "credito")
      .limit(1);

    if(jaLancado.data && jaLancado.data.length) return true;

    var pontos = Number(row.cashback_pts || 0);
    if(pontos <= 0) return false;

    var dentDb = await supa.from("dentistas")
      .select("id, pontos")
      .eq("id", row.dentista_id)
      .single();

    if(dentDb.error || !dentDb.data){
      console.error("dentistas select credito:", dentDb.error);
      return false;
   }

    var novoSaldo = Number(dentDb.data.pontos || 0) + pontos;

    var ins = await supa.from("cashback_lancamentos").insert({
      dentista_id: row.dentista_id,
      agendamento_id: agendamentoId,
      nfse_id: row.nfse_id,
      tipo: "credito",
      pontos: pontos,
      motivo: "Cashback confirmado por NFS-e emitida"
    });

    if(ins.error){
      console.error("cashback_lancamentos credito:", ins.error);
      return false;
    }

    var updDent = await supa.from("dentistas")
      .update({ pontos: novoSaldo })
      .eq("id", row.dentista_id);

    if(updDent.error){
      console.error("dentistas update credito:", updDent.error);
      return false;
    }

    var dent = fdent(row.dentista_id);
    if(dent) dent.pts = novoSaldo;
    return true;
  }catch(e){
    console.error("creditarCashbackSeElegivel:", e);
    return false;
  }
}

      .eq("tipo", "credito")
      .limit(1);

    if(!credito.data || !credito.data.length) return false;

    var estornoJa = await supa.from("cashback_lancamentos")
      .select("id")
      .eq("agendamento_id", agendamentoId)
      .eq("tipo", "estorno")
      .limit(1);

    if(estornoJa.data && estornoJa.data.length) return true;

    var pontos = Number(credito.data[0].pontos || 0);
    if(pontos <= 0) return false;

    var dentDb = await supa.from("dentistas")
      .select("id, pontos")
      .eq("id", row.dentista_id)
      .single();

    if(dentDb.error || !dentDb.data){
      console.error("dentistas select estorno:", dentDb.error);
      return false;
    }

    var novoSaldo = Math.max(0, Number(dentDb.data.pontos || 0) - pontos);

    var ins = await supa.from("cashback_lancamentos").insert({
      dentista_id: row.dentista_id,
      agendamento_id: agendamentoId,
      nfse_id: row.nfse_id,
      tipo: "estorno",
      pontos: pontos,
      motivo: "Estorno por cancelamento da NFS-e"
    });

    if(ins.error){
      console.error("cashback_lancamentos estorno:", ins.error);
      return false;
    }

    var updDent = await supa.from("dentistas")
      .update({ pontos: novoSaldo })
      .eq("id", row.dentista_id);

    if(updDent.error){
      console.error("dentistas update estorno:", updDent.error);
      return false;
    }

    var dent = fdent(row.dentista_id);
    if(dent) dent.pts = novoSaldo;
    return true;
  }catch(e){
    console.error("estornarCashbackSeNecessario:", e);
    return false;
  }
}
async function dbUpdAgSt(id, st){
  var ag = (ags || []).find(function(x){ return x.id === id; });
  if(!ag) return false;

  var r = await supa.from("agendamentos")
    .update({
      status: st,
      status_clinico: st
    })
    .eq("id", id);

  if(r.error){
    console.error("dbUpdAgSt:", r.error);
    return false;
  }

  ag.st = st;
  ag.status_clinico = st;
  return true;
}
async function dbUpdStatusFiscalAgendamento(agendamentoId, statusFiscal, nfseId){
  var payload = {
    status_fiscal: statusFiscal
  };

  if(nfseId){
    payload.nfse_id = nfseId;
  }

  if(statusFiscal === "emitida"){
    payload.faturado_em = new Date().toISOString();
    payload.pode_pontuar = true;
  }

  if(statusFiscal === "cancelada"){
    payload.pode_pontuar = false;
  }

  var r = await supa.from("agendamentos")
    .update(payload)
    .eq("id", agendamentoId);

  if(r.error){
    console.error("dbUpdStatusFiscalAgendamento:", r.error);
    return false;
  }

  var ag = (ags || []).find(function(x){ return x.id === agendamentoId; });
  if(ag){
    ag.status_fiscal = statusFiscal;
    if(nfseId) ag.nfse_id = nfseId;
  }

  if(statusFiscal === "emitida"){
    await creditarCashbackSeElegivel(agendamentoId);
  }

  if(statusFiscal === "cancelada"){
    await estornarCashbackSeNecessario(agendamentoId);
  }

  return true;
}

async function dbSaveUser(u, senha, isNew) {
  var bgMap = {
    admin:    "linear-gradient(135deg,#4ab848,#7dcf6e)",
    agenda:   "linear-gradient(135deg,#2dd4bf,#0d9488)",
    cashback: "linear-gradient(135deg,#a78bfa,#7c3aed)",
    dentista: "linear-gradient(135deg,#fbbf24,#f59e0b)"
  };
  var role = String(u.role || "agenda");
  var email = String(u.email || "").trim().toLowerCase();
  var ini  = (u.ini || u.nome.split(" ").map(function(x){return x[0]||"";}).join("").slice(0,2)).toUpperCase();
  var bg   = bgMap[role] || bgMap["agenda"];

  var supaAuth = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false,
      storage: {
        getItem: function(){ return null; },
        setItem: function(){},
        removeItem: function(){}
      }
    }
  });

  try {
    if (isNew) {
      var perfil = {
        nome: u.nome,
        email: email,
        role: role,
        ini: ini,
        bg: bg,
        cor: "#fff",
        ativo: true,
        dent_id: u.dentId || null
      };

      var r = await supa.from("usuarios").insert(perfil).select().single();
      console.log("PROFILE INSERT =>", r);

      if (r.error) {
        console.error("PROFILE INSERT error =>", r.error);
        var r2 = await supa.from("usuarios")
          .update({ nome: u.nome, role: role, ini: ini, bg: bg, ativo: true, dent_id: u.dentId || null })
          .eq("email", email)
          .select().single();
        console.log("PROFILE UPDATE fallback =>", r2);
        if (r2.error) {
          console.error("PROFILE UPDATE fallback error =>", r2.error);
          return false;
        }
        if (r2.data) u.id = r2.data.id;
      } else if (r.data) {
        u.id = r.data.id;
      }

      if (senha) {
        var authRes = await supaAuth.auth.signUp({ email: email, password: senha });
        console.log("AUTH signUp =>", authRes);
        if (authRes.error) {
          console.error("AUTH signUp error =>", authRes.error);
          return false;
        }
      }
      return true;
    } else {
      var upd = { nome: u.nome, role: role, ini: ini, bg: bg, ativo: u.ativo !== false, dent_id: u.dentId || null };
      var r3 = await supa.from("usuarios").update(upd).eq("email", email).select().single();
      if (r3.error) {
        console.error("update error:", r3.error);
        return false;
      }
      return true;
    }
  } catch (e) {
    console.error("dbSaveUser fatal =>", e);
    return false;
  }
}

  return true;
}

<script>
// ══ AUTH & USERS ══
var USERS = [];
// Dados reais vêm do Supabase via loadAllData()
var PERMS = {
  admin:    {dashboard:1,atendimento:1,historico:1,agendar:1,exames:1,convenios:1,cashback:1,dentistas:1,usuarios:1,config:1},
  agenda:   {dashboard:1,atendimento:1,historico:1,agendar:1,exames:1,convenios:0,cashback:0,dentistas:0,usuarios:0,config:0},
  cashback: {dashboard:1,atendimento:0,historico:0,agendar:0,exames:0,convenios:0,cashback:1,dentistas:1,usuarios:0,config:0},
  dentista: {dashboard:0,atendimento:0,historico:0,agendar:0,exames:0,convenios:0,cashback:1,dentistas:0,usuarios:0,config:0}
};
var RL = {admin:"Administrador",agenda:"Agenda",cashback:"Cashback",dentista:"Dentista"};
var RE = {admin:"⚙️",agenda:"📅",cashback:"🪙",dentista:"🦷"};
var RC = {admin:"rb-a",agenda:"rb-ag",cashback:"rb-c",dentista:"rb-d"};
var CU = null;


function doLogin() {
  var email = document.getElementById("lEmail").value.trim().toLowerCase();
  var senha = document.getElementById("lPass").value;
  var btn = document.getElementById("lBtn");
  var err = document.getElementById("lErr");
  err.classList.remove("show");
  btn.disabled = true;
  btn.textContent = "Verificando...";
  setTimeout(function() {
    var u = null;
    for (var i = 0; i < USERS.length; i++) {
      if (USERS[i].email.toLowerCase() === email && USERS[i].senha === senha && USERS[i].ativo) {
        u = USERS[i]; break;
      }
    }
    btn.disabled = false;
    btn.textContent = "Entrar";
    if (!u) { err.classList.add("show"); return; }
    CU = u;
    document.getElementById("LS").style.display = "none";
    document.getElementById("AS").style.display = "block";
    applyNav();
    var fp = "dashboard";
    if (u.role === "dentista") fp = "cashback";
    else {
      var pk = Object.keys(PERMS[u.role] || {});
      for (var j = 0; j < pk.length; j++) { if (PERMS[u.role][pk[j]]) { fp = pk[j]; break; } }
    }
    navTo(fp);
    toast("👋", "Bem-vindo(a), " + u.nome.split(" ")[0] + "!");
  }, 500);
}

function doLogout() {
  CU = null;
  document.getElementById("AS").style.display = "none";
  document.getElementById("LS").style.display = "flex";
  document.getElementById("lEmail").value = "";
  document.getElementById("lPass").value = "";
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
}

function canAcc(p) { return CU && !!((PERMS[CU.role] || {})[p]); }

function applyNav() {
  var u = CU;
  var av = document.getElementById("uAv");
  if (av) { av.style.background = u.bg; av.style.color = u.cor; av.textContent = u.ini; }
  var un = document.getElementById("uNmHdr");
  if (un) un.textContent = u.nome.split(" ").slice(0, 2).join(" ");
  var rb = document.getElementById("uRb");
  if (rb) { rb.textContent = RE[u.role] + " " + RL[u.role]; rb.className = "rb " + RC[u.role]; }
  document.querySelectorAll("#nav button").forEach(function(btn) {
    btn.style.display = (PERMS[u.role] || {})[btn.dataset.p] ? "" : "none";
  });
}

function deny(el) {
  el.innerHTML = "<div class='adeny'><div class='adi'>🔒</div><h3>Acesso Restrito</h3><p>Seu perfil nao tem permissao para esta area.</p></div>";
}

// ══ TOAST ══
var tT;
function toast(ico, msg) {
  document.getElementById("tIco").textContent = ico;
  document.getElementById("tMsg").textContent = msg;
  var t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(tT);
  tT = setTimeout(function() { t.classList.remove("show"); }, 3000);
}

// ══ MODAL ══
function openM(title, body, btns) {
  document.getElementById("MT").textContent = title;
  document.getElementById("MB2").innerHTML = body;
  var f = document.getElementById("MF"); f.innerHTML = "";
  (btns || []).forEach(function(b) {
    var btn = document.createElement("button");
    btn.className = "btn " + b.cls; btn.textContent = b.lbl; btn.onclick = b.fn;
    f.appendChild(btn);
  });
  document.getElementById("MO").classList.add("open");
}
function closeM() { document.getElementById("MO").classList.remove("open"); }
function closeMa() { document.getElementById("MA").classList.remove("open"); }

// ══ NAV ══
function navTo(page) {
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll("#nav button").forEach(function(b) { b.classList.remove("active"); });
  var pe = document.getElementById("page-" + page);
  if (pe) pe.classList.add("active");
  var nb = document.querySelector("#nav button[data-p='" + page + "']");
  if (nb) nb.classList.add("active");
  var map = {
    dashboard: rdash, atendimento: ratendimento, historico: rhistorico, agendar: ragendar, exames: rexames,
    convenios: rconv, cashback: rcash, dentistas: rdent,
    usuarios: rusrs, config: rcfg
  };
  if (map[page]) map[page]();
}
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("nav").addEventListener("click", function(e) {
    if (e.target.dataset.p) navTo(e.target.dataset.p);
  });
  // Modal não fecha mais ao clicar fora — apenas pelo botão X ou Voltar
  document.getElementById("lPass").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doLoginSupa();
  });
  document.getElementById("lEmail").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("lPass").focus();

    if(!sess.data || !sess.data.session || !sess.data.session.user) return;

    var user = sess.data.session.user;

    document.getElementById("LS").style.display = "none";

    iniciarAutoRefresh();
  }catch(e){

  }
}

  if(_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(async function(){

    try{

async function buscarHistorico() {
  var input = document.getElementById("histBuscaInput");
  if (!input) return;
  var termo = input.value.trim();
  if (termo.length < 2) { toast("!", "Digite pelo menos 2 caracteres"); return; }

  histBusca = termo;
  histPaciente = null;
  histResultados = [];
  histLoading = true;
  renderHistorico();

  try {
    var termoLimpo = termo.replace(/\D/g, "");
    var filtro = "";
    var isNumero = termoLimpo.length >= 3 && /^\d+$/.test(termoLimpo);

    // Se parece CPF (so numeros, 8+ digitos)
    if (isNumero && termoLimpo.length >= 8) {
      filtro = "paciente_cpf=ilike.*" + termoLimpo + "*";
    }
    // Se é número curto (3-7 dígitos), busca só por código DigitalS
    else if (isNumero) {
      filtro = "";
    }
    // Senao busca por nome
    else {
      filtro = "paciente_nome=ilike.*" + encodeURIComponent(termo.toUpperCase()) + "*";
    }

    // Buscar pacientes distintos
    var promises = [];

    // Busca principal (nome ou CPF)
    if (filtro) {
      promises.push(supaFetch("/rest/v1/historico_atendimentos?select=paciente_id,paciente_nome,paciente_cpf&" + filtro + "&limit=500").then(function(r){return r.json()}).catch(function(){return []}));
    } else {
      promises.push(Promise.resolve([]));
    }

    // Se é número, busca também por código DigitalS no histórico e agendamentos
    if (isNumero) {
      promises.push(supaFetch("/rest/v1/historico_atendimentos?select=paciente_id,paciente_nome,paciente_cpf&fb_seq_atend=eq." + termoLimpo + "&limit=10").then(function(r){return r.json()}).catch(function(){return []}));
      promises.push(supaFetch("/rest/v1/agendamentos?select=paciente_id,paciente_nome,paciente_cpf&firebird_seq_atend=eq." + termoLimpo + "&limit=10").then(function(r){return r.json()}).catch(function(){return []}));
    }

    var resultados = await Promise.all(promises);
    var dados = [];
    resultados.forEach(function(r){ dados = dados.concat(r || []); });

    // Agrupar por paciente (deduplicar)
    var pacMap = {};
    (dados || []).forEach(function(d) {
      var key = d.paciente_id || d.paciente_nome;
      if (!pacMap[key]) {
        pacMap[key] = {
          id: d.paciente_id,
          nome: d.paciente_nome,
          cpf: d.paciente_cpf
        };
      }
    });

    histResultados = Object.values(pacMap).sort(function(a, b) {
      return (a.nome || '').localeCompare(b.nome || '');
    });

    // Se achou só 1, ja abre direto
    if (histResultados.length === 1) {
      histPaciente = histResultados[0];
      histResultados = [];
      histPage = 0;
      histLoading = false;
      renderHistorico();
      await carregarHistPaciente();
      return;
    }
  } catch (e) {
    console.error("buscarHistorico:", e);
    toast("Erro", "Falha na busca");
  }

  histLoading = false;
  renderHistorico();
}

function renderHistBuscaResultados() {
  var h = "";

var histAtendimentos = [];
var histTotalAtend = 0;
var histTotalValor = 0;

async function carregarHistPaciente() {
  if (!histPaciente) return;
  histLoading = true;
  renderHistorico();

  try {
    var filtro = "";
    if (histPaciente.id) {
      filtro = "paciente_id=eq." + histPaciente.id;
    } else if (histPaciente.cpf) {
      filtro = "paciente_cpf=eq." + histPaciente.cpf;
    } else {
      filtro = "paciente_nome=eq." + encodeURIComponent(histPaciente.nome);
    }

    var r = await supaFetch("/rest/v1/historico_atendimentos?select=*&" + filtro + "&order=data_atendimento.desc&limit=1000");
    histAtendimentos = await r.json();

    // Se não achou por ID, tenta por nome
    if ((!histAtendimentos || histAtendimentos.length === 0) && histPaciente.nome) {
      var r2 = await supaFetch("/rest/v1/historico_atendimentos?select=*&paciente_nome=eq." + encodeURIComponent(histPaciente.nome) + "&order=data_atendimento.desc&limit=1000");
      histAtendimentos = await r2.json();
    }

    // Também buscar em agendamentos recentes do mesmo paciente
    try {
      var filtroAg = histPaciente.nome ? "paciente_nome=eq." + encodeURIComponent(histPaciente.nome) : "";
      if (histPaciente.id) filtroAg = "paciente_id=eq." + histPaciente.id + "&" + filtroAg;
      if (filtroAg) {
        var r3 = await supaFetch("/rest/v1/agendamentos?select=id,paciente_nome,paciente_cpf,data_exame,status,valor,firebird_seq_atend,dentista_id,convenio_id&" + filtroAg + "&order=data_exame.desc&limit=50");
        var agsRecentes = await r3.json();
        // Converter agendamentos pro formato do historico e adicionar se não duplicado
        var seqsExist = {};
        histAtendimentos.forEach(function(a){ if(a.fb_seq_atend) seqsExist[a.fb_seq_atend] = true; });
        (agsRecentes||[]).forEach(function(ag){
          if(ag.firebird_seq_atend && seqsExist[ag.firebird_seq_atend]) return;
          var d = fdent(ag.dentista_id) || {n:''};
          histAtendimentos.unshift({
            fb_seq_atend: ag.firebird_seq_atend,
            paciente_nome: ag.paciente_nome,
            paciente_cpf: ag.paciente_cpf,
            dentista_nome: d.n || '',
            exame_nome: '',
            exame_valor: ag.valor,
            convenio_nome: '',
            data_atendimento: ag.data_exame,
            status: ag.status === 'realizado' ? 'E' : 'A'
          });
        });
      }
    } catch(e2){}

    histTotalAtend = 0;
    histTotalValor = 0;
    var seqs = {};
    histAtendimentos.forEach(function(a) {
      if (a.fb_seq_atend && !seqs[a.fb_seq_atend]) {
        seqs[a.fb_seq_atend] = true;
        histTotalAtend++;
      }
      histTotalValor += Number(a.exame_valor || 0);
    });

  } catch (e) {
    console.error("carregarHistPaciente:", e);
    histAtendimentos = [];
  }

  histLoading = false;
  renderHistorico();
}

    h += "<div class='hist-pag-btn" + (histPage === 0 ? "' style='opacity:.3;pointer-events:none'" : "'") + " onclick='histPaginar(" + (histPage - 1) + ")'>&laquo;</div>";

    var startP = Math.max(0, histPage - 3);
    var endP = Math.min(totalPages, histPage + 4);
    for (var p = startP; p < endP; p++) {
      h += "<div class='hist-pag-btn" + (p === histPage ? " active" : "") + "' onclick='histPaginar(" + p + ")'>" + (p + 1) + "</div>";
    }

    h += "<div class='hist-pag-btn" + (histPage >= totalPages - 1 ? "' style='opacity:.3;pointer-events:none'" : "'") + " onclick='histPaginar(" + (histPage + 1) + ")'>&raquo;</div>";
    h += "<div class='hist-pag-btn" + (histPage >= totalPages - 1 ? "' style='opacity:.3;pointer-events:none'" : "'") + " onclick='histPaginar(" + (totalPages - 1) + ")'>Última</div>";
    h += "</div>";
  }

  return h;
}

async function buscarPacienteGlobal(){
  var input = document.getElementById("atBuscaPac");
  if(!input) return;
  var termo = input.value.trim();
  if(termo.length < 2){toast("!","Digite pelo menos 2 caracteres");return}
  var box = document.getElementById("atBuscaResultados");
  if(!box) return;
  box.innerHTML = "<div style='padding:10px;color:var(--gr)'>Buscando...</div>";

  try{
    var termoLimpo = termo.replace(/\D/g,"");
    var isNumero = termoLimpo.length >= 3 && /^\d+$/.test(termoLimpo);
    var promises = [];

    // Nome
    if(!isNumero){
      promises.push(supaFetch("/rest/v1/agendamentos?select=*&paciente_nome=ilike.*"+encodeURIComponent(termo.toUpperCase())+"*&order=data_exame.desc&limit=20").then(function(r){return r.json()}).catch(function(){return []}));
    }
    // CPF (8+ digitos)
    if(isNumero && termoLimpo.length >= 8){
      promises.push(supaFetch("/rest/v1/agendamentos?select=*&paciente_cpf=ilike.*"+termoLimpo+"*&order=data_exame.desc&limit=20").then(function(r){return r.json()}).catch(function(){return []}));
    }
    // DigitalS code
    if(isNumero){
      promises.push(supaFetch("/rest/v1/agendamentos?select=*&firebird_seq_atend=eq."+termoLimpo+"&limit=10").then(function(r){return r.json()}).catch(function(){return []}));
      promises.push(supaFetch("/rest/v1/agendamentos?select=*&firebird_atend_id=eq."+termoLimpo+"&limit=10").then(function(r){return r.json()}).catch(function(){return []}));
    }

    if(!promises.length){promises.push(Promise.resolve([]))}
    var results = await Promise.all(promises);
    var todos = [];
    results.forEach(function(r){todos = todos.concat(r||[])});

    // Deduplicar por id
    var seen = {};
    var uniq = [];
    todos.forEach(function(a){
      if(!seen[a.id]){seen[a.id]=true;uniq.push(a)}
    });

    if(!uniq.length){
      box.innerHTML = "<div style='padding:10px;color:var(--or)'>Nenhum agendamento encontrado para \""+esc(termo)+"\"</div>";
      return;
    }

    // Mostrar resultados
    var rh = "<div style='margin-bottom:12px;font-size:.8rem;color:var(--gr)'>"+uniq.length+" resultado"+(uniq.length>1?"s":"")+"</div>";
    uniq.forEach(function(a){
      var dt = a.data_exame ? iso2br(a.data_exame) : "—";
      var hr = (a.hora_exame||"").substring(0,5);
      var st = a.status_clinico || a.status || "agendado";
      var sl = {agendado:"Agendado",realizado:"Realizado",cancelado:"Cancelado",aguardando:"Aguardando"};
      var sc = {agendado:"bo",realizado:"bg",cancelado:"bgr",aguardando:"bgo"};
      rh += "<div style='display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;cursor:pointer' onclick='abrirAgGlobal("+a.id+")'>";
      rh += "<div style='flex:1'><strong>"+esc(a.paciente_nome||"?")+"</strong>";
      rh += "<div style='font-size:.75rem;color:var(--gr)'>"+dt+" "+hr+" — "+(a.firebird_seq_atend?"#"+a.firebird_seq_atend:"")+"</div></div>";
      rh += "<span class='badge "+(sc[st]||"bgr")+"' style='font-size:.6rem'>"+sl[st]+"</span>";
      rh += "<span style='color:var(--tl);font-size:.8rem;cursor:pointer'>Abrir →</span>";
      rh += "</div>";
    });
    rh += "<div style='margin-top:8px'><button class='btn btno bsm' onclick='document.getElementById(\"atBuscaResultados\").innerHTML=\"\";document.getElementById(\"atBuscaPac\").value=\"\"'>Limpar busca</button></div>";
    box.innerHTML = rh;
  }catch(e){
    box.innerHTML = "<div style='padding:10px;color:var(--or)'>Erro: "+e.message+"</div>";
  }
}

function renderAtCalendario() {
  var yr = atDate.getFullYear();
  var mo = atDate.getMonth();
  var mns2 = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  var h = "<div class='at-cal'>";
  h += "<div class='at-cal-hdr'>";
  h += "<div class='at-cal-title'>" + mns2[mo] + " " + yr + "</div>";
  h += "<div class='at-cal-nav'>";
  h += "<button class='at-cal-btn' onclick='atCalNav(-1)'>&#8249;</button>";
  h += "<button class='at-cal-btn' onclick='atCalGoToday()' style='font-size:.68rem;width:auto;padding:0 8px'>Hoje</button>";
  h += "<button class='at-cal-btn' onclick='atCalNav(1)'>&#8250;</button>";
  h += "</div></div>";

  h += "<div class='at-cal-grid'>";
  ["D","S","T","Q","Q","S","S"].forEach(function(d) {
    h += "<div class='at-cal-dn'>" + d + "</div>";
  });

  var first = new Date(yr, mo, 1);
  var lastDay = new Date(yr, mo + 1, 0).getDate();
  var startDow = first.getDay();

  var hoje = new Date();
  var hojeS = agF(hoje);
  var selS = agF(atDate);

  // Dias vazios antes
  for (var i = 0; i < startDow; i++) {
    h += "<div class='at-cal-d emp'></div>";
  }

  // Dias do mês
  for (var d = 1; d <= lastDay; d++) {
    var dd = new Date(yr, mo, d);
    var dds = agF(dd);
    var cls = "at-cal-d";
    if (dds === hojeS) cls += " tod";
    if (dds === selS) cls += " sel";

    // Verificar se tem agendamentos nesse dia
    var temAg = ags.some(function(a) { return a.dt === dds; });

    h += "<div class='" + cls + "' onclick='atSelectDay(" + yr + "," + mo + "," + d + ")'>" + d;
    if (temAg) h += "<div class='dot'></div>";
    h += "</div>";
  }

  h += "</div></div>";
  return h;
}

function atSelectDay(yr, mo, d) {
  atDate = new Date(yr, mo, d);
  atFilter = "realizado";
  renderAtendimento();
}

function atCalNav(dir) {
  var yr = atDate.getFullYear();
  var mo = atDate.getMonth() + dir;

}

function atCalGoToday() {
  var now = new Date();
  atDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  atFilter = "realizado";
  renderAtendimento();
}

function setAtFilter(f) {
  atFilter = f;
  renderAtendimento();
}

function agDays() {
  if(agView==="dia") return [new Date(agBase)];

function agF(d){return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}

function rndAg() {

  }
  var totalMins=(AGE-AGS)*60; var slots=totalMins/5;

  h+="<div class=\"ag-tc\"><div style=\"height:44px;border-bottom:1px solid rgba(255,255,255,.07)\"></div>";

  }

  days.forEach(function(day){

    h+="<div style=\"position:relative\">";

      h+="<div class=\"ag-cl"+hfcls+"\" style=\"height:"+AGSZ+"px\" onclick=\"agCC('"+cd+"','"+ct+"')\" ></div>";
    }

      var dp=a.dt.split("/");
      return new Date(parseInt(dp[2]),parseInt(dp[1])-1,parseInt(dp[0])).toDateString()===day.toDateString();
    });
    // Calcular colunas para eventos sobrepostos
    dayAgs.sort(function(a,b){ return t2m(a.hr)-t2m(b.hr); });
    var evCols=[]; // {sm, em, col, totalCols}
    dayAgs.forEach(function(a){

      // Achar coluna livre
      var col=0;
      for(var c=0;c<100;c++){
        var livre=true;
        for(var j=0;j<evCols.length;j++){
          if(evCols[j].col===c && sm<evCols[j].em && em>evCols[j].sm){ livre=false; break; }
        }
        if(livre){ col=c; break; }
      }
      evCols.push({id:a.id, sm:sm, em:em, col:col});
    });
    // Calcular total de colunas por grupo de overlap
    dayAgs.forEach(function(a,idx){
      var me=evCols[idx];
      var maxCol=me.col;
      for(var j=0;j<evCols.length;j++){
        if(me.sm<evCols[j].em && me.em>evCols[j].sm){
          if(evCols[j].col>maxCol) maxCol=evCols[j].col;
        }
      }
      me.totalCols=maxCol+1;
    });
    dayAgs.forEach(function(a,idx){
      var sm=t2m(a.hr); var dur=a.dur||30; var em2=sm+dur;
      var top2=((sm-AGS*60)/5)*AGSZ; var ht=Math.max((dur/5)*AGSZ,54);
      var ec=evCols[idx];
      var colW=100/ec.totalCols;
      var evLeft=(ec.col*colW)+1;
      var evWidth=colW-2;
      var ex2=fex(a.ex); var cv2=fconv(a.cv);
      var nomesEx = "";
      if (Array.isArray(a.exames) && a.exames.length) {
        nomesEx = a.exames.map(function(it){
          var ex = fex(it.exame_id);
          return ex ? ex.n : it.exame_id;
        }).join(", ");
      } else {
        nomesEx = ex2 ? ex2.n : "—";
      }
      var cl=ECS[a.st]||"ec0";
      h += "<div class=\"ag-ev "+cl+"\" style=\"top:"+top2+"px;height:"+ht+"px;left:"+evLeft+"%;width:"+evWidth+"%\" onclick=\"agEV(event,"+a.id+")\">";
      h+="<div class=\"et\">"+esc(a.hr)+" – "+esc(m2t(em2))+" | <strong>"+esc(a.pac)+"</strong></div>";
      h+="<div class=\"es\">"+esc(nomesEx)+"</div>";
      if(a.st==="realizado") h+="<div class=\"eck\">&#10003;</div>";
      h+="</div>";
    });
    if(isT){var now3=new Date();var nm3=now3.getHours()*60+now3.getMinutes();if(nm3>=AGS*60&&nm3<AGE*60){var nt=((nm3-AGS*60)/5)*AGSZ;h+="<div class=\"ag-nl\" style=\"top:"+nt+"px\"></div>";}}
    h+="</div></div>";
  });
  h+="</div></div>";
  var prevScroll = gw.scrollTop;
  var hadContent = gw.innerHTML.length > 10;
  gw.innerHTML=h;
  if(hadContent && prevScroll > 0){
    gw.scrollTop = prevScroll;
  } else {
    gw.scrollTop=((8*60-AGS*60)/5)*AGSZ-60;
  }
}

function onCepInputAuto(el, isEdit){
  if(!el) return;

  maskCEP(el);

  var cep = el.value.replace(/\D/g, "");
  if (cep.length !== 8) return;

  buscarCepAuto(cep).then(function(data){
    if(!data){
      toast("CEP", "CEP não encontrado");
      return;
    }

    var prefix = isEdit ? "e" : "p";

    if (document.getElementById(prefix + "Logradouro"))
      document.getElementById(prefix + "Logradouro").value = data.logradouro;

    if (document.getElementById(prefix + "Bairro"))
      document.getElementById(prefix + "Bairro").value = data.bairro;

    if (document.getElementById(prefix + "Municipio"))
      document.getElementById(prefix + "Municipio").value = data.municipio;

    if (document.getElementById(prefix + "Uf"))
      document.getElementById(prefix + "Uf").value = data.uf;
  });
}
function updAgSumEdit(){
  var itens = getExamesSelecionados("eExames");
  var formaPg = document.getElementById("eFormaPg")?.value || "avista";
  var div = document.getElementById("eAgSumDiv");
  if(!div) return;

  // Auto-preencher previsão na edição se campo estiver vazio
  var prevEl = document.getElementById("ePrevisaoEntrega");
  if(prevEl && !prevEl.value && itens.length) prevEl.value = calcPrevisaoEntrega(itens);

  if (!itens.length) {
    div.innerHTML = "<div class='smb'><div class='smr'><span>Nenhum exame selecionado</span></div></div>";
    return;
  }

  var linhas = "";

  itens.forEach(function(it){
    var ex = fex(it.exame_id);
    var cv = fconv(it.convenio_id || "");
    var preco = Number(it.preco || 0);
    var foraFat = itemEhConvenioForaDoFaturamento(it);

    linhas += "<div class='smr'>" +
      "<span>" +
        esc(ex ? ex.n : it.exame_id) +
        (cv ? " <span style='color:var(--gr)'>(" + esc(cv.n) + ")</span>" : "") +
        (foraFat ? " <span style='color:#f87171;font-size:.72rem'>(fora do faturamento)</span>" : "") +
      "</span>" +
      "<strong>R$ " + preco.toFixed(2).replace('.', ',') + "</strong>" +
      "</div>";
  });

  var itensFaturaveis = getItensFaturaveisPaciente(itens);
  var brutoCD = somarItens(itensFaturaveis.filter(function(it){ return itemTemDesconto(it); }));
  var brutoSD = somarItens(itensFaturaveis.filter(function(it){ return !itemTemDesconto(it); }));
  var calc = calcularValorFinalComDesconto(brutoCD, formaPg);
  calc.valor_bruto += brutoSD;
  calc.valor_faturado += brutoSD;

  div.innerHTML =
    "<div class='smb'>" +
      linhas +
      "<div class='smr smt'><span>Valor bruto faturável</span><strong>R$ " + calc.valor_bruto.toFixed(2).replace('.', ',') + "</strong></div>" +
      "<div class='smr'><span>Desconto</span><strong>" + calc.desconto_percentual + "% / R$ " + calc.desconto_valor.toFixed(2).replace('.', ',') + "</strong></div>" +
      "<div class='smr smt'><span>Valor final do paciente</span><strong>R$ " + calc.valor_faturado.toFixed(2).replace('.', ',') + "</strong></div>" +
    "</div>";
}

async function buscarCepAuto(cep){
  var c = String(cep || "").replace(/\D/g,"");

  if (c.length !== 8) return null;

  try{
    var r = await fetch("https://viacep.com.br/ws/" + c + "/json/");
    var d = await r.json();

    if (d.erro) return null;

    return {
      logradouro: d.logradouro || "",
      bairro: d.bairro || "",
      municipio: d.localidade || "",
      uf: d.uf || ""
    };
  }catch(e){
    console.error("Erro CEP:", e);
    return null;
  }
}

  var valorFinal = bruto - descontoValor;

    desconto_valor: Number(descontoValor.toFixed(2)),
    valor_faturado: Number(valorFinal.toFixed(2))
  };
}

      valor_bruto: bruto,
      desconto_percentual: perc,
      desconto_valor: Number(descontoValor.toFixed(2)),
      valor_faturado: Number(valorFinal.toFixed(2))
    };
  }

    {lbl:"Adicionar",cls:"btng",fn:function(){
      var exId=document.getElementById("addExSel").value;

        closeM(); rconv();

async function aplicarAjusteCashbackAdmin(){
  var dentId = parseInt((document.getElementById("cbAjDent").value || "0"), 10);
  var tipo = document.getElementById("cbAjTipo").value;
  var pontos = parseInt(document.getElementById("cbAjPts").value || 0, 10);
  var motivo = document.getElementById("cbAjMotivo").value.trim();
  var senha = document.getElementById("cbAjSenha").value;

  if(!dentId){
    toast("⚠️","Selecione um dentista");
    return;
  }

  if(pontos <= 0){
    toast("⚠️","Informe uma quantidade válida");
    return;
  }

  if(!senha){
    toast("⚠️","Digite sua senha");
    return;
  }

  var okSenha = await validarSenhaUsuarioAtual(senha);
  if(!okSenha){
    toast("⚠️","Senha inválida");
    return;
  }

  var d = fdent(dentId);
  if(!d){
    toast("⚠️","Dentista não encontrado");
    return;
  }

  if(tipo === "debito" && (d.pts || 0) < pontos){
    toast("⚠️","Saldo insuficiente para desconto");
    return;
  }

  var novoSaldo = (d.pts || 0) + (tipo === "credito" ? pontos : -pontos);

  var hist = await supa.from("cashback_ajustes").insert({
    dentista_id: dentId,
    tipo: tipo,
    pontos: pontos,
    motivo: motivo || null,
    usuario_email: CU.email
  });

  if(hist.error){
    console.error("cashback_ajustes:", hist.error);
    toast("⚠️","Erro ao gravar histórico");
    return;
  }

  var upd = await supa.from("dentistas")
    .update({ pontos: novoSaldo })
    .eq("id", dentId);

  if(upd.error){
    console.error("aplicarAjusteCashbackAdmin:", upd.error);
    toast("⚠️","Erro ao aplicar ajuste");
    return;
  }

  d.pts = novoSaldo;

  await loadAllData();
  rcashAdmin();
  toast("✅", tipo === "credito" ? "Pontos adicionados" : "Pontos descontados");
}

  if(document.getElementById("cbAjPts")) document.getElementById("cbAjPts").value = "";
  if(document.getElementById("cbAjMotivo")) document.getElementById("cbAjMotivo").value = "";
  if(document.getElementById("cbAjSenha")) document.getElementById("cbAjSenha").value = "";
}

async function validarSenhaUsuarioAtual(senha){
  if(!CU || !CU.email || !senha) return false;

  var cli = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false
    }
  });

  var r = await cli.auth.signInWithPassword({
    email: CU.email,
    password: senha
  });

  if(r.error){
    console.error("validarSenhaUsuarioAtual:", r.error);
    return false;
  }

  await cli.auth.signOut();
  return true;
}

async function aplicarAjusteCashback(){
  var dentId = document.getElementById("cbAjDent").value;
  var tipo = document.getElementById("cbAjTipo").value;
  var pontos = Number(document.getElementById("cbAjPts").value || 0);
  var motivo = document.getElementById("cbAjMot").value.trim();

  if(!dentId){
    toast("Atenção", "Selecione um dentista.");
    return;
  }

  if(!pontos || pontos <= 0){
    toast("Atenção", "Informe uma quantidade de pontos válida.");
    return;
  }

  var d = fdent(dentId);
  if(!d){
    toast("Erro", "Dentista não encontrado.");
    return;
  }

  if(tipo === "debito" && Number(d.pts || 0) < pontos){
    toast("Atenção", "O dentista não possui pontos suficientes.");
    return;
  }

  openM(
    "Confirmar ajuste de cashback",
    ""
    + "<div class='field'>"
    +   "<label>Senha de autorização</label>"
    +   "<input id='cbAjSenha' type='password' placeholder='Digite a senha'>"
    + "</div>"
    + "<div style='margin-top:12px;font-size:.84rem;color:var(--gr)'>"
    +   "Dentista: <strong>" + esc(d.n) + "</strong><br>"
    +   "Tipo: <strong>" + (tipo === "credito" ? "Adicionar" : "Remover") + "</strong><br>"
    +   "Pontos: <strong>" + fmtN(pontos) + "</strong><br>"
    +   "Motivo: <strong>" + esc(motivo || "Ajuste manual") + "</strong>"
    + "</div>",
    [
      {
        lbl: "Cancelar",
        cls: "btno",
        fn: function(){ closeM(); }
      },
      {
        lbl: "Confirmar ajuste",
        cls: "btng",
        fn: async function(){
          var senha = (document.getElementById("cbAjSenha").value || "").trim();

          // TROQUE A SENHA AQUI
          if(senha !== "1234"){
            toast("Atenção", "Senha incorreta.");
            return;
          }

          var novoSaldo = tipo === "credito"
            ? Number(d.pts || 0) + pontos
            : Number(d.pts || 0) - pontos;

          var payload = {
            dentista_id: dentId,
            tipo: tipo,
            pontos: pontos,
            motivo: motivo || "Ajuste manual"
          };

          try{
            if(typeof supa !== "undefined"){
              var ins = await supa.from("cashback_ajustes").insert(payload).select().single();
              if(ins && !ins.error && ins.data){
                AJUSTES_CB = AJUSTES_CB || [];
                AJUSTES_CB.unshift(ins.data);
              }
            }else{
              AJUSTES_CB = AJUSTES_CB || [];
              AJUSTES_CB.unshift({
                id: "aj_" + Date.now(),
                dentista_id: dentId,
                tipo: tipo,
                pontos: pontos,
                motivo: motivo || "Ajuste manual"
              });
            }

            d.pts = novoSaldo;

            if(typeof supa !== "undefined"){
              var upd = await supa.from("dentistas").update({ pontos: novoSaldo }).eq("id", dentId);
              if(upd.error){
                console.error("Erro ao atualizar pontos:", upd.error);
                toast("Erro", "Falha ao atualizar saldo do dentista.");
                return;
              }
            }

            closeM();
            toast("Sucesso", "Ajuste aplicado.");
            rcashAdmin();
          }catch(e){
            console.error("aplicarAjusteCashback:", e);
            toast("Erro", "Falha ao aplicar ajuste.");
          }
        }
      }
    ]
  );
}

async function dentEndLoad(dentId){

  try {
    var r = await supa.from("dentista_enderecos").select("*").eq("dentista_id", dentId).order("id", {ascending:true});

    var ends = r.data || [];
    if(!ends.length){
      el.innerHTML="<div style='color:#666;font-size:12px;padding:6px'>Nenhum endereco cadastrado</div>";
      return;
    }
    window._dentEndCache=ends.map(function(e){return{id:e.id,dentista_id:dentId,descricao:e.descricao||"",endereco:e.endereco||"",complemento:e.complemento||"",bairro:e.bairro||"",cep:e.cep||"",cidade:e.cidade||"",principal:!!e.principal,_status:"existing"};});

function dentEndAddRow(){
  window._dentEndCache.push({id:null,dentista_id:null,descricao:"",endereco:"",complemento:"",bairro:"",cep:"",cidade:"Santa Maria",principal:false,_status:"new"});
  dentEndRender();

  var el=document.getElementById("dentEndList");

function dentEndRemove(idx){
  if(window._dentEndCache[idx]._status==="new"){
    window._dentEndCache.splice(idx,1);
  } else {
    window._dentEndCache[idx]._status="deleted";
  }
  dentEndRender();
}

function dentEndSetPrincipal(idx){
  // Coleta valores antes de re-renderizar pra não perder digitação
  dentEndCollectFromForm();
  // Garante 1 só principal: marca o escolhido, desmarca os outros
  window._dentEndCache.forEach(function(e,i){
    if(e._status!=="deleted") e.principal = (i === idx);
  });
  dentEndRender();
}

function dentEndCollectFromForm(){
  window._dentEndCache.forEach(function(e,i){
    if(e._status==="deleted") return;
    var desc=document.getElementById("deDesc"+i);
    if(desc) e.descricao=desc.value.trim();
    var end=document.getElementById("deEnd"+i);
    if(end) e.endereco=end.value.trim();
    var compl=document.getElementById("deCompl"+i);
    if(compl) e.complemento=compl.value.trim();
